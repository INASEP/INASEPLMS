<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INASEP - Emisión de Diplomas y Certificados</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- Librerías para PDF y QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2ef;
            font-family: 'Segoe UI', Roboto, 'Times New Roman', serif;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Panel lateral de búsqueda */
        .search-panel {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #d4e0d6;
        }
        .search-panel h2 {
            font-size: 1.6rem;
            color: #1e3d28;
            margin-bottom: 16px;
            border-left: 6px solid #4a8c5c;
            padding-left: 18px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-top: 16px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #4a6651;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #dee8e0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fbfefc;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4a8c5c;
        }
        button {
            background: #4a8c5c;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        button:hover {
            background: #2a5536;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #4a8c5c;
            color: #2a5536;
        }
        .btn-outline:hover {
            background: #4a8c5c;
            color: white;
        }
        .alumnos-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #dee8e0;
        }
        .alumno-item {
            padding: 16px 24px;
            border-bottom: 1px solid #e5f0e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: 0.1s;
            cursor: pointer;
        }
        .alumno-item:hover {
            background: #f6fcf8;
        }
        .alumno-info h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .alumno-info p {
            font-size: 0.8rem;
            color: #6e8b78;
        }
        .badge {
            background: #eef6f0;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2a5536;
        }
        /* Vista previa del diploma */
        .preview-area {
            background: #f9fbf9;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #d0e2d4;
        }
        .certificate-template {
            background: white;
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid #c0cfc4;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }
        .certificate-border {
            border: 8px double #c49a6c;
            border-radius: 12px;
            padding: 32px 28px;
            background: #fffef7;
        }
        .certificate-content {
            text-align: center;
            font-family: 'Times New Roman', Georgia, serif;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-img {
            max-height: 80px;
            margin-bottom: 8px;
        }
        .certificate-title {
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #b8860b;
            font-weight: 800;
            text-transform: uppercase;
            margin: 20px 0 10px;
        }
        .certificate-sub {
            font-size: 1.1rem;
            font-style: italic;
            color: #5a6e5e;
            border-top: 1px solid #c49a6c;
            border-bottom: 1px solid #c49a6c;
            display: inline-block;
            padding: 4px 20px;
        }
        .recipient-name {
            font-size: 2rem;
            font-weight: 700;
            margin: 30px 0 15px;
            color: #2c3e2b;
            border-bottom: 1px dashed #b6cfb0;
            display: inline-block;
            padding-bottom: 10px;
        }
        .course-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #3a6b45;
            margin: 20px 0;
        }
        .score-row {
            background: #f2f7f0;
            display: inline-block;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .date-sign {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            border-top: 1px solid #e2e8e0;
            padding-top: 30px;
        }
        .signature {
            text-align: center;
        }
        .signature-line {
            width: 200px;
            border-top: 1px solid #222;
            margin: 8px auto;
        }
        .qr-code {
            width: 100px;
            margin-top: 10px;
        }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        @media (max-width: 650px) {
            .certificate-border { padding: 16px; }
            .recipient-name { font-size: 1.4rem; }
            .course-name { font-size: 1.2rem; }
        }
        .hidden {
            display: none;
        }
        .alert {
            padding: 12px;
            background: #e5f0e8;
            border-left: 5px solid #4a8c5c;
            margin-bottom: 20px;
            border-radius: 12px;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #4a8c5c;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="search-panel">
        <h2>🎓 Emisión de Diplomas y Certificados</h2>
        <div id="authStatus" class="alert" style="display:none"></div>
        <div class="form-row">
            <div class="form-group">
                <label>Buscar alumno (nombre / RUT / email)</label>
                <input type="text" id="searchInput" placeholder="Ej: 19.681.751-4 o nombre" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Tipo de documento</label>
                <select id="docType">
                    <option value="diploma">🏅 Diploma de Honor</option>
                    <option value="certificado">📜 Certificado de Aprobación</option>
                </select>
            </div>
            <div><button id="searchBtn">🔍 Buscar</button></div>
        </div>
        <div id="resultsList" class="alumnos-list" style="margin-top:20px; display:none"></div>
    </div>

    <div id="previewContainer" class="preview-area hidden">
        <div class="certificate-template" id="certificateTemplate">
            <!-- Se llenará dinámicamente -->
        </div>
        <div class="actions">
            <button id="downloadPdfBtn" class="btn-outline">📄 Descargar PDF</button>
        </div>
    </div>
</div>

<script>
    // ---------- CONFIGURACIÓN FIREBASE (la misma del index.html) ----------
    const firebaseConfig = {
        apiKey: "AIzaSyDnzXP59rK49bmKbDeYX8oUtobVaKyI2A4",
        authDomain: "mi-lms-563bf.firebaseapp.com",
        projectId: "mi-lms-563bf",
        storageBucket: "mi-lms-563bf.firebasestorage.app",
        messagingSenderId: "303910884065",
        appId: "1:303910884065:web:5f2fe854e17fd25ed21da0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentAdmin = false;
    let selectedStudent = null;
    let selectedCourseResult = null;
    let generatedToken = null;
    let currentQR = null;

    // Autenticación obligatoria (solo administradores)
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().role === 'admin') {
                currentAdmin = true;
                document.getElementById('authStatus').style.display = 'none';
                loadInitialSuggestions();
            } else {
                document.getElementById('authStatus').style.display = 'block';
                document.getElementById('authStatus').innerHTML = '⛔ Acceso restringido. Solo administradores.';
                document.getElementById('searchBtn').disabled = true;
            }
        } else {
            document.getElementById('authStatus').style.display = 'block';
            document.getElementById('authStatus').innerHTML = '🔐 Debes iniciar sesión como administrador. <a href="#" onclick="auth.signInWithRedirect(firebase.auth.GoogleAuthProvider)">Ir al login</a>';
            document.getElementById('searchBtn').disabled = true;
        }
    });

    async function loadInitialSuggestions() {
        // Cargar lista de alumnos recientes para mostrar al inicio
        const snapshot = await db.collection('users').where('role', '==', 'student').limit(20).get();
        if (!snapshot.empty) renderAlumnosList(snapshot.docs);
    }

    document.getElementById('searchBtn').addEventListener('click', async () => {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return loadInitialSuggestions();
        let studentDocs = [];
        // Buscar por email exacto o RUT o nombre contenido
        const byEmail = await db.collection('users').where('email', '==', query).where('role', '==', 'student').get();
        if (!byEmail.empty) studentDocs = byEmail.docs;
        else {
            const byRut = await db.collection('users').where('rut', '==', query).where('role', '==', 'student').get();
            if (!byRut.empty) studentDocs = byRut.docs;
            else {
                const byName = await db.collection('users').where('name', '>=', query).where('name', '<=', query + '\uf8ff').where('role', '==', 'student').get();
                studentDocs = byName.docs;
            }
        }
        if (studentDocs.length === 0) {
            document.getElementById('resultsList').style.display = 'block';
            document.getElementById('resultsList').innerHTML = '<div style="padding:20px;text-align:center">No se encontraron alumnos.</div>';
            return;
        }
        renderAlumnosList(studentDocs);
    });

    async function renderAlumnosList(docs) {
        const container = document.getElementById('resultsList');
        container.style.display = 'block';
        let html = '';
        for (const doc of docs) {
            const data = doc.data();
            // Obtener mejor resultado de cada curso aprobado (>60%)
            const resultsSnap = await db.collection('quizResults')
                .where('userId', '==', doc.id)
                .where('percentage', '>=', 60)  // solo aprobados
                .get();
            const coursesApproved = new Map(); // courseId -> best result
            for (const r of resultsSnap.docs) {
                const rData = r.data();
                const courseId = rData.courseId;
                if (!coursesApproved.has(courseId) || coursesApproved.get(courseId).percentage < rData.percentage) {
                    coursesApproved.set(courseId, { ...rData, resultId: r.id });
                }
            }
            if (coursesApproved.size === 0) {
                html += `<div class="alumno-item" data-uid="${doc.id}" data-name="${escapeHtml(data.name)}" data-rut="${data.rut || ''}" data-email="${data.email}" style="opacity:0.6">
                            <div><strong>${escapeHtml(data.name)}</strong><br><span style="font-size:12px">${data.rut || 'Sin RUT'} | ${data.email}</span></div>
                            <span class="badge">⚠️ Sin cursos aprobados</span>
                        </div>`;
            } else {
                for (let [courseId, result] of coursesApproved.entries()) {
                    const courseDoc = await db.collection('courses').doc(courseId).get();
                    const courseTitle = courseDoc.exists ? courseDoc.data().title : 'Curso';
                    html += `<div class="alumno-item" data-uid="${doc.id}" data-name="${escapeHtml(data.name)}" data-rut="${data.rut || ''}" data-email="${data.email}" data-courseid="${courseId}" data-coursetitle="${escapeHtml(courseTitle)}" data-percentage="${result.percentage}" data-score="${result.score}/${result.total}" data-date="${result.createdAt?.toDate?.() || new Date()}">
                                <div><strong>${escapeHtml(data.name)}</strong><br><span style="font-size:12px">${data.rut || 'Sin RUT'} | ${data.email}</span></div>
                                <div><span class="badge">✅ ${escapeHtml(courseTitle)} - ${result.percentage}%</span></div>
                            </div>`;
                }
            }
        }
        container.innerHTML = html;
        // adjuntar evento a cada item
        document.querySelectorAll('.alumno-item').forEach(el => {
            el.addEventListener('click', async () => {
                selectedStudent = {
                    uid: el.dataset.uid,
                    name: el.dataset.name,
                    rut: el.dataset.rut,
                    email: el.dataset.email
                };
                if (el.dataset.courseid) {
                    selectedCourseResult = {
                        courseId: el.dataset.courseid,
                        courseTitle: el.dataset.coursetitle,
                        percentage: parseInt(el.dataset.percentage),
                        score: el.dataset.score,
                        date: new Date(el.dataset.date)
                    };
                } else {
                    selectedCourseResult = null;
                }
                if (selectedCourseResult) {
                    await generateDiplomaPreview();
                } else {
                    document.getElementById('previewContainer').classList.add('hidden');
                    alert('Este alumno no registra cursos aprobados con 60% o más.');
                }
            });
        });
    }

    async function generateDiplomaPreview() {
        const docType = document.getElementById('docType').value;
        const student = selectedStudent;
        const course = selectedCourseResult;
        if (!student || !course) return;

        // 1. Crear token único y guardar en Firestore para verificación
        const token = btoa(`${student.uid}_${course.courseId}_${Date.now()}`).replace(/=/g,'');
        generatedToken = token;
        const diplomaData = {
            token: token,
            studentId: student.uid,
            studentName: student.name,
            studentRut: student.rut,
            studentEmail: student.email,
            courseId: course.courseId,
            courseName: course.courseTitle,
            percentage: course.percentage,
            score: course.score,
            issuedAt: firebase.firestore.FieldValue.serverTimestamp(),
            type: docType,
            verificationUrl: `${window.location.origin}/verificar.html?id=${token}`
        };
        // Guardar en colección 'diplomas'
        await db.collection('diplomas').doc(token).set(diplomaData, { merge: true });

        // 2. Renderizar plantilla HTML
        const templateDiv = document.getElementById('certificateTemplate');
        const formattedDate = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: 'long', year: 'numeric' });
        const logoImg = '<svg width="80" height="80" viewBox="0 0 100 100" style="background:#2e5c3b; border-radius:50%; padding:10px"><text x="50" y="65" font-size="28" text-anchor="middle" fill="white" font-weight="bold">IN</text></svg>';
        let titleHtml = '';
        if (docType === 'diploma') {
            titleHtml = `<div class="certificate-title">DIPLOMA DE HONOR</div>
                         <div class="certificate-sub">Excelencia Académica</div>`;
        } else {
            titleHtml = `<div class="certificate-title">CERTIFICADO DE APROBACIÓN</div>
                         <div class="certificate-sub">Formación Profesional</div>`;
        }
        const qrDiv = `<div id="qrCodeContainer" style="display:flex;justify-content:center;margin:12px auto 0;"></div>`;
        templateDiv.innerHTML = `
            <div class="certificate-border">
                <div class="certificate-content">
                    <div class="logo-area">
                        <div style="font-size:38px;font-weight:bold;color:#1e3d28;">INASEP</div>
                        <div style="font-size:12px;letter-spacing:2px;">INSTITUTO NACIONAL DE SEGURIDAD PRIVADA</div>
                    </div>
                    ${titleHtml}
                    <p style="font-size:1rem;margin:16px 0 0;">Certifica que</p>
                    <div class="recipient-name">${escapeHtml(student.name)}</div>
                    <p>con RUT ${student.rut || '________________'}</p>
                    <p>ha finalizado exitosamente el curso de</p>
                    <div class="course-name">${escapeHtml(course.courseTitle)}</div>
                    <div class="score-row">Obteniendo un puntaje de ${course.percentage}% (${course.score})</div>
                    <div class="date-sign">
                        <div>${formattedDate}</div>
                        <div class="signature">
                            <div>________________________</div>
                            <div>Elizabeth Orellana Pizarro</div>
                            <div style="font-size:11px;">Directora Instituto Inasep SpA</div>
                        </div>
                    </div>
                    <div id="qrCodeArea" style="margin-top:20px;"></div>
                </div>
            </div>
        `;
        // Generar QR
        const qrContainer = templateDiv.querySelector('#qrCodeArea');
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, {
            text: diplomaData.verificationUrl,
            width: 100,
            height: 100,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
        document.getElementById('previewContainer').classList.remove('hidden');
    }

    // Descargar PDF
    document.getElementById('downloadPdfBtn').addEventListener('click', () => {
        const element = document.getElementById('certificateTemplate');
        const opt = {
            margin:        [0.4, 0.4, 0.4, 0.4], // pulgadas
            filename:     `Diploma_${selectedStudent?.name.replace(/\s/g,'_') || 'alumno'}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    });

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
</script>
</body>
</html>
