<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INASEP - Emisión de Diplomas y Certificados</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#eef2ef;font-family:'Segoe UI',Roboto,'Times New Roman',serif;padding:2rem 1rem}
.container{max-width:1400px;margin:0 auto}
.search-panel{background:white;border-radius:20px;padding:24px;margin-bottom:30px;box-shadow:0 8px 20px rgba(0,0,0,0.05);border:1px solid #d4e0d6}
.search-panel h2{font-size:1.6rem;color:#1e3d28;margin-bottom:16px;border-left:6px solid #4a8c5c;padding-left:18px}
.form-row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-top:16px}
.form-group{flex:1;min-width:200px}
.form-group label{display:block;font-size:0.75rem;text-transform:uppercase;font-weight:700;color:#4a6651;letter-spacing:0.5px;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:2px solid #dee8e0;border-radius:14px;font-family:inherit;font-size:0.9rem;background:#fbfefc}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#4a8c5c}
button{background:#4a8c5c;border:none;padding:12px 28px;border-radius:40px;font-weight:700;font-size:0.85rem;color:white;cursor:pointer;transition:0.2s;font-family:inherit}
button:hover{background:#2a5536;transform:scale(0.98)}
button:disabled{background:#a0b8a8;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:2px solid #4a8c5c;color:#2a5536}
.btn-outline:hover{background:#4a8c5c;color:white}
.btn-small{padding:8px 18px;font-size:0.75rem}
.btn-manual{background:#b8860b;border:none}
.btn-manual:hover{background:#8b6508}
.alumnos-list{background:white;border-radius:20px;overflow:hidden;margin-bottom:30px;border:1px solid #dee8e0}
.alumno-item{padding:16px 24px;border-bottom:1px solid #e5f0e8;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;transition:0.1s;cursor:pointer}
.alumno-item:hover{background:#f6fcf8}
.alumno-info h4{font-size:1.1rem;margin-bottom:4px}
.alumno-info p{font-size:0.8rem;color:#6e8b78}
.badge{background:#eef6f0;padding:5px 12px;border-radius:50px;font-size:0.75rem;font-weight:600;color:#2a5536}
.badge-error{background:#fdeaea;color:#c0392b}
.badge-warn{background:#fff8e5;color:#b8860b}
.preview-area{background:#f9fbf9;border-radius:24px;padding:24px;border:1px solid #d0e2d4;margin-bottom:20px}
.preview-title{text-align:center;font-size:1.2rem;color:#1e3d28;margin-bottom:20px;font-weight:700}
.actions{display:flex;gap:15px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.alert{padding:12px;background:#e5f0e8;border-left:5px solid #4a8c5c;margin-bottom:20px;border-radius:12px}
.alert-error{background:#fdeaea;border-left-color:#c0392b}
.alert-warn{background:#fff8e5;border-left-color:#b8860b}
.hidden{display:none!important}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(0,0,0,0.1);border-radius:50%;border-top-color:#4a8c5c;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box{padding:30px;text-align:center;color:#6e8b78}
.manual-panel{background:#fff8e5;border:2px solid #b8860b;border-radius:16px;padding:20px;margin-top:16px}
.manual-panel h3{color:#8b6508;margin-bottom:12px;font-size:1rem}
.manual-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.manual-row .form-group{min-width:150px;flex:1}
.manual-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}

/* DIPLOMA HORIZONTAL */
.diploma-template{width:11in;height:8.5in;background:white;position:relative;overflow:hidden;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
.diploma-bar-top,.diploma-bar-bottom{position:absolute;left:0;width:100%;height:28px;background:#1e3d28}
.diploma-bar-top{top:0}
.diploma-bar-bottom{bottom:0}
.diploma-inner{position:absolute;top:28px;left:0;right:0;bottom:28px;padding:30px 50px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.diploma-logo{position:absolute;top:45px;left:50px;width:80px;height:80px;object-fit:contain}
.diploma-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;opacity:0.08;pointer-events:none;z-index:0}
.diploma-title{font-family:'Times New Roman',Georgia,serif;font-size:2.6rem;color:#1e3d28;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:8px;z-index:1}
.diploma-sub{font-family:'Times New Roman',Georgia,serif;font-size:1.15rem;color:#2a5536;margin-bottom:20px;z-index:1}
.diploma-name{font-family:'Times New Roman',Georgia,serif;font-size:2.2rem;color:#b8860b;font-weight:700;margin:15px 0;z-index:1}
.diploma-text{font-family:'Times New Roman',Georgia,serif;font-size:1.05rem;color:#2c3e2b;text-align:center;max-width:750px;line-height:1.6;z-index:1}
.diploma-date{font-family:'Times New Roman',Georgia,serif;font-size:1rem;color:#2c3e2b;margin-top:20px;z-index:1}
.diploma-signature-area{display:flex;flex-direction:column;align-items:center;margin-top:15px;z-index:1}
.diploma-signature-img{width:180px;height:auto;margin-bottom:4px}
.diploma-signature-line{width:220px;border-top:1px solid #333;margin-bottom:6px}
.diploma-signature-text{font-family:'Times New Roman',Georgia,serif;font-size:0.95rem;color:#2c3e2b;text-align:center;line-height:1.4}
.diploma-sello{position:absolute;bottom:45px;left:50px;width:110px;height:110px;object-fit:contain;z-index:1}
.diploma-qr-area{position:absolute;bottom:40px;right:50px;display:flex;flex-direction:column;align-items:center;z-index:1}
.diploma-qr-text{font-size:0.65rem;color:#555;text-align:center;line-height:1.3;margin-top:4px}

/* CERTIFICADO VERTICAL */
.cert-template{width:8.5in;height:11in;background:white;position:relative;overflow:hidden;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
.cert-bar-top,.cert-bar-bottom{position:absolute;left:0;width:100%;height:28px;background:#1e3d28}
.cert-bar-top{top:0}
.cert-bar-bottom{bottom:0}
.cert-inner{position:absolute;top:28px;left:0;right:0;bottom:28px;padding:35px 55px;display:flex;flex-direction:column;align-items:center}
.cert-logo{position:absolute;top:45px;left:55px;width:80px;height:80px;object-fit:contain}
.cert-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;opacity:0.08;pointer-events:none;z-index:0}
.cert-title{font-family:'Times New Roman',Georgia,serif;font-size:2.4rem;color:#1e3d28;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-top:20px;margin-bottom:25px;z-index:1}
.cert-sub{font-family:'Times New Roman',Georgia,serif;font-size:1.2rem;color:#2a5536;margin-bottom:25px;z-index:1}
.cert-name{font-family:'Times New Roman',Georgia,serif;font-size:2rem;color:#b8860b;font-weight:700;margin:10px 0 25px;z-index:1}
.cert-text{font-family:'Times New Roman',Georgia,serif;font-size:1.1rem;color:#2c3e2b;text-align:justify;text-align-last:center;max-width:680px;line-height:1.7;z-index:1}
.cert-text b{color:#1e3d28}
.cert-date{font-family:'Times New Roman',Georgia,serif;font-size:1.1rem;color:#2c3e2b;margin-top:35px;z-index:1}
.cert-signature-area{display:flex;flex-direction:column;align-items:center;margin-top:20px;z-index:1}
.cert-signature-img{width:180px;height:auto;margin-bottom:4px}
.cert-signature-line{width:220px;border-top:1px solid #333;margin-bottom:6px}
.cert-signature-text{font-family:'Times New Roman',Georgia,serif;font-size:0.95rem;color:#2c3e2b;text-align:center;line-height:1.4}
.cert-sello{position:absolute;bottom:45px;left:55px;width:110px;height:110px;object-fit:contain;z-index:1}
.cert-qr-area{position:absolute;bottom:40px;right:55px;display:flex;flex-direction:column;align-items:center;z-index:1}
.cert-qr-text{font-size:0.65rem;color:#555;text-align:center;line-height:1.3;margin-top:4px}

@media (max-width:900px){
.diploma-template{transform:scale(0.55);transform-origin:top center}
.cert-template{transform:scale(0.55);transform-origin:top center}
}
</style>
</head>
<body>
<div class="container">
  <div class="search-panel">
    <h2>🎓 Emisión de Diplomas y Certificados</h2>
    <div id="authStatus" class="alert hidden"></div>
    <div id="errorStatus" class="alert alert-error hidden"></div>
    <div id="warnStatus" class="alert alert-warn hidden"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Buscar alumno (nombre / RUT / email)</label>
        <input type="text" id="searchInput" placeholder="Ej: 19.681.751-4 o nombre" autocomplete="off">
      </div>
      <div><button id="searchBtn">🔍 Buscar</button></div>
    </div>
    <div id="resultsList" class="alumnos-list hidden">
      <div id="resultsContent"></div>
    </div>
  </div>

  <!-- PANEL MANUAL (se muestra si no hay datos automáticos) -->
  <div id="manualPanel" class="manual-panel hidden">
    <h3>✏️ Emisión Manual — Ingresa los datos del curso</h3>
    <div class="manual-row">
      <div class="form-group">
        <label>Alumno</label>
        <input type="text" id="manualName" readonly>
      </div>
      <div class="form-group">
        <label>RUT</label>
        <input type="text" id="manualRut" readonly>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="manualEmail" readonly>
      </div>
    </div>
    <div class="manual-row">
      <div class="form-group">
        <label>Nombre del Curso *</label>
        <input type="text" id="manualCourse" placeholder="Ej: Supervisor de Seguridad Privada" value="Supervisor de Seguridad Privada">
      </div>
      <div class="form-group">
        <label>Porcentaje (%) *</label>
        <input type="number" id="manualPercentage" placeholder="88" value="88" min="0" max="100">
      </div>
      <div class="form-group">
        <label>Score (ej: 88/100)</label>
        <input type="text" id="manualScore" placeholder="88/100" value="88/100">
      </div>
      <div class="form-group">
        <label>Carga Horaria</label>
        <input type="number" id="manualHours" placeholder="120" value="120">
      </div>
    </div>
    <div class="manual-actions">
      <button class="btn-outline btn-small" onclick="closeManual()">Cancelar</button>
      <button class="btn-manual btn-small" onclick="generateFromManual()">📄 Generar Diploma + Certificado</button>
    </div>
  </div>

  <div id="previewDiplomaContainer" class="preview-area hidden">
    <div class="preview-title">📄 Vista Previa — Diploma de Honor (Horizontal)</div>
    <div class="diploma-template" id="diplomaTemplate"></div>
    <div class="actions">
      <button id="downloadDiplomaBtn" class="btn-outline">⬇️ Descargar Diploma PDF</button>
    </div>
  </div>

  <div id="previewCertContainer" class="preview-area hidden">
    <div class="preview-title">📜 Vista Previa — Certificado de Aprobación (Vertical)</div>
    <div class="cert-template" id="certTemplate"></div>
    <div class="actions">
      <button id="downloadCertBtn" class="btn-outline">⬇️ Descargar Certificado PDF</button>
    </div>
  </div>
</div>

// AUTENTICACIÓN
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    $('authStatus').innerHTML = '🔐 Debes iniciar sesión como administrador. <a href="#" onclick="auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())">Iniciar sesión con Google</a>';
    $('authStatus').classList.remove('hidden');
    $('searchBtn').disabled = true;
    return;
  }
  try {
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().role === 'admin') {
      currentAdmin = true;
      $('authStatus').classList.add('hidden');
      $('searchBtn').disabled = false;
      await loadInitialSuggestions();
    } else {
      $('authStatus').innerHTML = '⛔ Acceso restringido. Solo administradores pueden emitir documentos.';
      $('authStatus').classList.remove('hidden');
      $('searchBtn').disabled = true;
    }
  } catch (err) {
    showError('Error al verificar permisos: ' + err.message);
    $('searchBtn').disabled = true;
  }
});

// CARGA INICIAL
async function loadInitialSuggestions() {
  setLoading(true); clearAlerts();
  try {
    const snapshot = await db.collection('users').where('role', '==', 'student').limit(20).get();
    if (snapshot.empty) {
      $('resultsContent').innerHTML = '<div class="loading-box">No hay alumnos registrados.</div>';
    } else {
      await renderAlumnosList(snapshot.docs);
    }
  } catch (err) {
    showError('Error al cargar alumnos: ' + err.message);
    $('resultsContent').innerHTML = '';
  }
}

// BÚSQUEDA
$('searchBtn').addEventListener('click', async () => {
  const query = $('searchInput').value.trim();
  if (!query) return loadInitialSuggestions();
  setLoading(true); clearAlerts();
  let studentDocs = [];
  try {
    const byEmail = await db.collection('users').where('email', '==', query).where('role', '==', 'student').get();
    if (!byEmail.empty) { studentDocs = byEmail.docs; }
    else {
      const byRut = await db.collection('users').where('rut', '==', query).where('role', '==', 'student').get();
      if (!byRut.empty) { studentDocs = byRut.docs; }
      else {
        const byName = await db.collection('users').where('role', '==', 'student').where('name', '>=', query).where('name', '<=', query + '\uf8ff').limit(20).get();
        studentDocs = byName.docs;
      }
    }
    if (studentDocs.length === 0) {
      $('resultsContent').innerHTML = '<div class="loading-box">No se encontraron alumnos.</div>';
    } else {
      await renderAlumnosList(studentDocs);
    }
  } catch (err) {
    showError('Error en búsqueda: ' + err.message);
  }
});
$('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') $('searchBtn').click(); });

// RENDERIZAR ALUMNOS — con fallback si falla quizResults
async function renderAlumnosList(docs) {
  $('resultsList').classList.remove('hidden');
  let html = '';
  let indexError = false;

  for (const doc of docs) {
    const data = doc.data();
    let coursesHtml = '';
    let hasError = false;
    let errorMsg = '';

    // Intentar 1: consulta compuesta (requiere índice)
    try {
      const resultsSnap = await db.collection('quizResults')
        .where('userId', '==', doc.id)
        .where('percentage', '>=', 60)
        .get();

      const coursesApproved = new Map();
      for (const r of resultsSnap.docs) {
        const rData = r.data();
        const courseId = rData.courseId;
        if (!coursesApproved.has(courseId) || coursesApproved.get(courseId).percentage < rData.percentage) {
          coursesApproved.set(courseId, { ...rData, resultId: r.id });
        }
      }

      if (coursesApproved.size === 0) {
        coursesHtml = renderCourseRow(doc.id, data.name, data.rut, data.email, null, null);
      } else {
        for (const [courseId, result] of coursesApproved) {
          let courseTitle = 'Curso';
          try { const c = await db.collection('courses').doc(courseId).get(); if (c.exists) courseTitle = c.data().title || 'Curso'; } catch(e){}
          const dateStr = result.createdAt && result.createdAt.toDate ? result.createdAt.toDate().toISOString() : new Date().toISOString();
          coursesHtml += renderCourseRow(doc.id, data.name, data.rut, data.email, courseId, result, courseTitle, dateStr);
        }
      }
    } catch (err) {
      hasError = true;
      errorMsg = err.message;
      console.error('Firestore error for', doc.id, err);

      // Fallback: intentar sin índice compuesto (solo por userId)
      try {
        const fallbackSnap = await db.collection('quizResults').where('userId', '==', doc.id).get();
        const coursesApproved = new Map();
        for (const r of fallbackSnap.docs) {
          const rData = r.data();
          if ((rData.percentage || 0) >= 60) {
            const courseId = rData.courseId;
            if (!coursesApproved.has(courseId) || coursesApproved.get(courseId).percentage < rData.percentage) {
              coursesApproved.set(courseId, { ...rData, resultId: r.id });
            }
          }
        }
        if (coursesApproved.size > 0) {
          hasError = false; // Se recuperó con fallback
          for (const [courseId, result] of coursesApproved) {
            let courseTitle = 'Curso';
            try { const c = await db.collection('courses').doc(courseId).get(); if (c.exists) courseTitle = c.data().title || 'Curso'; } catch(e){}
            const dateStr = result.createdAt && result.createdAt.toDate ? result.createdAt.toDate().toISOString() : new Date().toISOString();
            coursesHtml += renderCourseRow(doc.id, data.name, data.rut, data.email, courseId, result, courseTitle, dateStr);
          }
        } else {
          coursesHtml = renderCourseRow(doc.id, data.name, data.rut, data.email, null, null);
        }
      } catch (err2) {
        // Ni siquiera el fallback funcionó — mostrar emisión manual
        indexError = true;
        coursesHtml = `<div class="alumno-item">
          <div class="alumno-info"><h4>${escapeHtml(data.name)}</h4><p>${data.rut || 'Sin RUT'} | ${data.email}</p></div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="badge badge-error">❌ Error al cargar cursos</span>
            <button class="btn-manual btn-small" onclick="openManual('${escapeHtml(doc.id)}','${escapeHtml(data.name)}','${escapeHtml(data.rut||'')}','${escapeHtml(data.email||'')}')">Emitir manual</button>
          </div>
        </div>`;
      }
    }

    html += coursesHtml;
  }

  $('resultsContent').innerHTML = html;
  attachClickHandlers();

  if (indexError) {
    showWarn('⚠️ Firestore requiere un índice compuesto para quizResults (userId + percentage). Haz clic en "Emitir manual" para cada alumno, o crea el índice en la consola de Firebase.');
  }
}

function renderCourseRow(uid, name, rut, email, courseId, result, courseTitle, dateStr) {
  if (!courseId) {
    return `<div class="alumno-item" style="opacity:0.6">
      <div class="alumno-info"><h4>${escapeHtml(name)}</h4><p>${rut || 'Sin RUT'} | ${email}</p></div>
      <span class="badge badge-warn">⚠️ Sin cursos aprobados (≥60%)</span>
    </div>`;
  }
  return `<div class="alumno-item" 
    data-uid="${escapeHtml(uid)}"
    data-name="${escapeHtml(name)}"
    data-rut="${escapeHtml(rut||'')}"
    data-email="${escapeHtml(email||'')}"
    data-courseid="${escapeHtml(courseId)}"
    data-coursetitle="${escapeHtml(courseTitle)}"
    data-percentage="${result.percentage}"
    data-score="${escapeHtml(result.score + '/' + result.total)}"
    data-date="${dateStr}">
    <div class="alumno-info"><h4>${escapeHtml(name)}</h4><p>${rut || 'Sin RUT'} | ${email}</p></div>
    <span class="badge">✅ ${escapeHtml(courseTitle)} — ${result.percentage}%</span>
  </div>`;
}

function attachClickHandlers() {
  document.querySelectorAll('.alumno-item[data-courseid]').forEach(el => {
    el.addEventListener('click', () => {
      selectedStudent = {
        uid: el.dataset.uid,
        name: el.dataset.name,
        rut: el.dataset.rut,
        email: el.dataset.email
      };
      selectedCourseResult = {
        courseId: el.dataset.courseid,
        courseTitle: el.dataset.coursetitle,
        percentage: parseInt(el.dataset.percentage),
        score: el.dataset.score,
        date: new Date(el.dataset.date)
      };
      generateBothDocuments();
    });
  });
}

  $('manualPanel').classList.add('hidden');

function generateFromManual() {
  const courseTitle = $('manualCourse').value.trim();
  const percentage = parseInt($('manualPercentage').value);
  const score = $('manualScore').value.trim();
  const hours = parseInt($('manualHours').value) || 120;

  if (!courseTitle || !percentage) {
    alert('Completa al menos el nombre del curso y el porcentaje.');
    return;
  }

  selectedCourseResult = {
    courseId: 'manual_' + Date.now(),
    courseTitle: courseTitle,
    percentage: percentage,
    score: score || percentage + '/100',
    date: new Date()
  };

  generateBothDocuments();
  closeManual();
}

// ========== GENERAR DOCUMENTOS ==========
async function generateBothDocuments() {
  const student = selectedStudent;
  const course = selectedCourseResult;
  if (!student || !course) return;
  clearAlerts();

  const now = Date.now();
  const rand = Math.random().toString(36).substring(2, 8);
  diplomaToken = 'DIP_' + btoa(student.uid + '_' + course.courseId + '_' + now + '_' + rand).replace(/[^a-zA-Z0-9]/g, '').substring(0, 20);
  certToken = 'CERT_' + btoa(student.uid + '_' + course.courseId + '_' + now + '_' + rand).replace(/[^a-zA-Z0-9]/g, '').substring(0, 20);

  const baseUrl = window.location.origin.replace(/\/emitir\.html$/, '').replace(/\/$/, '');
  const diplomaUrl = `${baseUrl}/verificar.html?id=${diplomaToken}`;
  const certUrl = `${baseUrl}/verificar.html?id=${certToken}`;

  const commonData = {
    studentId: student.uid,
    studentName: student.name,
    studentRut: student.rut,
    studentEmail: student.email,
    courseId: course.courseId,
    courseName: course.courseTitle,
    percentage: course.percentage,
    score: course.score,
    issuedAt: firebase.firestore.FieldValue.serverTimestamp(),
    hours: course.hours || 120
  };

  try {
    await db.collection('diplomas').doc(diplomaToken).set({ ...commonData, token: diplomaToken, type: 'diploma', verificationUrl: diplomaUrl }, { merge: true });
    await db.collection('diplomas').doc(certToken).set({ ...commonData, token: certToken, type: 'certificado', verificationUrl: certUrl }, { merge: true });
  } catch (err) {
    showError('Error al guardar en Firestore: ' + err.message);
    return;
  }

  const hoy = new Date();
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaStr = `${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
  const fechaStrCert = `Quilpué, ${String(hoy.getDate()).padStart(2,'0')} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
  const mesCurso = meses[course.date.getMonth()] || meses[hoy.getMonth()];
  const anioCurso = course.date.getFullYear() || hoy.getFullYear();

  // DIPLOMA
  const diplomaDiv = $('diplomaTemplate');
  diplomaDiv.innerHTML = `
    <div class="diploma-bar-top"></div><div class="diploma-bar-bottom"></div>
    <img class="diploma-logo" src="${logo_escudo}" alt="INASEP">
    <img class="diploma-watermark" src="${watermark}" alt="">
    <div class="diploma-inner">
      <div class="diploma-title">DIPLOMA DE HONOR</div>
      <div class="diploma-sub">INSTITUTO INASEP SPA CERTIFICA QUE:</div>
      <div class="diploma-name">${escapeHtml(student.name)}</div>
      <div class="diploma-text">
        Ha finalizado con éxito el curso de ${escapeHtml(course.courseTitle)} de ${course.hours||120} horas,<br>
        obteniendo un puntaje de ${course.percentage}% en su promedio final.
      </div>
      <div class="diploma-date">Quilpué, ${fechaStr}</div>
      <div class="diploma-signature-area">
        <img class="diploma-signature-img" src="${firma}" alt="Firma">
        <div class="diploma-signature-line"></div>
        <div class="diploma-signature-text">Elizabeth Orellana Pizarro<br>Directora<br>Instituto Inasep SpA</div>
      </div>
    </div>
    <img class="diploma-sello" src="${sello}" alt="Sello">
    <div class="diploma-qr-area">
      <div id="qrDiploma"></div>
      <div class="diploma-qr-text">Curso SSVV ${hoy.getFullYear()}<br>Instituto INASEP SpA<br>Nueva Ley 21.659</div>
    </div>
  `;
  new QRCode($('qrDiploma'), { text: diplomaUrl, width: 90, height: 90, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M });
  $('previewDiplomaContainer').classList.remove('hidden');

  // CERTIFICADO
  const certDiv = $('certTemplate');
  certDiv.innerHTML = `
    <div class="cert-bar-top"></div><div class="cert-bar-bottom"></div>
    <img class="cert-logo" src="${logo_escudo}" alt="INASEP">
    <img class="cert-watermark" src="${watermark}" alt="">
    <div class="cert-inner">
      <div class="cert-title">CERTIFICADO DE APROBACIÓN</div>
      <div class="cert-sub">INSTITUTO INASEP SPA CERTIFICA QUE:</div>
      <div class="cert-name">${escapeHtml(student.name)}</div>
      <div class="cert-text">
        <b>RUT:</b> ${student.rut || '________________'} realizó y finalizó de manera exitosa el <b>Curso de ${escapeHtml(course.courseTitle)}</b> en Instituto Inasep SpA., durante el mes de ${mesCurso.toUpperCase()} del ${anioCurso}, con una carga horaria de ${course.hours||120} Horas, aprobando con un ${course.percentage}% todos sus módulos.<br><br>
        Se extiende el presente certificado, para los fines que estime conveniente.
      </div>
      <div class="cert-date">${fechaStrCert}</div>
      <div class="cert-signature-area">
        <img class="cert-signature-img" src="${firma}" alt="Firma">
        <div class="cert-signature-line"></div>
        <div class="cert-signature-text">Elizabeth Orellana Pizarro<br>Directora<br>Instituto Inasep SpA</div>
      </div>
    </div>
    <img class="cert-sello" src="${sello}" alt="Sello">
    <div class="cert-qr-area">
      <div id="qrCert"></div>
      <div class="cert-qr-text">Curso SSVV ${hoy.getFullYear()}<br>Instituto INASEP SpA<br>Nueva Ley 21.659</div>
    </div>
  `;
  new QRCode($('qrCert'), { text: certUrl, width: 90, height: 90, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M });
  $('previewCertContainer').classList.remove('hidden');

  window.scrollTo({ top: $('previewDiplomaContainer').offsetTop - 20, behavior: 'smooth' });
}

// DESCARGAS
$('downloadDiplomaBtn').addEventListener('click', () => {
  html2pdf().set({
    margin: 0,
    filename: `Diploma_${selectedStudent?.name?.replace(/\s/g,'_') || 'alumno'}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
  }).from($('diplomaTemplate')).save();
});

$('downloadCertBtn').addEventListener('click', () => {
  html2pdf().set({
    margin: 0,
    filename: `Certificado_${selectedStudent?.name?.replace(/\s/g,'_') || 'alumno'}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  }).from($('certTemplate')).save();
});

function escapeHtml(str) {
  if (!str) return '';
  return str.toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
</script>
