<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INASEP - Emisión de Diplomas y Certificados</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #eef2ef; font-family: 'Segoe UI', Roboto, 'Times New Roman', serif; padding: 2rem 1rem; }
.container { max-width: 1400px; margin: 0 auto; }
.search-panel { background: white; border-radius: 20px; padding: 24px; margin-bottom: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #d4e0d6; }
.search-panel h2 { font-size: 1.6rem; color: #1e3d28; margin-bottom: 16px; border-left: 6px solid #4a8c5c; padding-left: 18px; }
.form-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-top: 16px; }
.form-group { flex: 1; min-width: 200px; }
.form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: #4a6651; letter-spacing: 0.5px; margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 2px solid #dee8e0; border-radius: 14px; font-family: inherit; font-size: 0.9rem; background: #fbfefc; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #4a8c5c; }
button { background: #4a8c5c; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 700; font-size: 0.85rem; color: white; cursor: pointer; transition: 0.2s; font-family: inherit; }
button:hover { background: #2a5536; transform: scale(0.98); }
button:disabled { background: #a0b8a8; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; border: 2px solid #4a8c5c; color: #2a5536; }
.btn-outline:hover { background: #4a8c5c; color: white; }
.btn-loadmore { background: #b8860b; border: none; margin: 15px auto; display: block; }
.btn-loadmore:hover { background: #8b6508; }
.alumnos-list { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 30px; border: 1px solid #dee8e0; }
.alumno-item { padding: 16px 24px; border-bottom: 1px solid #e5f0e8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; transition: 0.1s; cursor: pointer; }
.alumno-item:hover { background: #f6fcf8; }
.alumno-info h4 { font-size: 1.1rem; margin-bottom: 4px; }
.alumno-info p { font-size: 0.8rem; color: #6e8b78; }
.badge { background: #eef6f0; padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; color: #2a5536; }
.preview-area { background: #f9fbf9; border-radius: 24px; padding: 24px; border: 1px solid #d0e2d4; margin-bottom: 20px; }
.preview-title { text-align: center; font-size: 1.2rem; color: #1e3d28; margin-bottom: 20px; font-weight: 700; }
.actions { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.alert { padding: 12px; background: #e5f0e8; border-left: 5px solid #4a8c5c; margin-bottom: 20px; border-radius: 12px; }
.alert-error { background: #fdeaea; border-left-color: #c0392b; }
.hidden { display: none !important; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #4a8c5c; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { padding: 30px; text-align: center; color: #6e8b78; }
.stats-bar { background: #f6fcf8; padding: 12px 20px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.85rem; color: #4a6651; }
.stats-bar span { font-weight: 700; color: #1e3d28; }

/* DIPLOMA HORIZONTAL - Carta 11x8.5in */
.diploma-template { width: 11in; height: 8.5in; background: white; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
.diploma-bar-top, .diploma-bar-bottom { position: absolute; left: -2px; width: calc(100% + 4px); height: 28px; background: #1e3d28; }
.diploma-bar-top { top: 0; }
.diploma-bar-bottom { bottom: 0; }
.diploma-inner { position: absolute; top: 28px; left: 0; right: 0; bottom: 28px; padding: 30px 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.diploma-logo { position: absolute; top: 45px; left: 50px; width: 80px; height: 80px; object-fit: contain; z-index: 2; }
.diploma-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; opacity: 0.06; pointer-events: none; z-index: 0; }
.diploma-title { font-family: 'Times New Roman', Georgia, serif; font-size: 2.6rem; color: #1e3d28; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; z-index: 1; }
.diploma-sub { font-family: 'Times New Roman', Georgia, serif; font-size: 1.15rem; color: #2a5536; margin-bottom: 20px; z-index: 1; }
.diploma-name { font-family: 'Times New Roman', Georgia, serif; font-size: 2.2rem; color: #b8860b; font-weight: 700; margin: 15px 0; z-index: 1; }
.diploma-text { font-family: 'Times New Roman', Georgia, serif; font-size: 1.05rem; color: #2c3e2b; text-align: center; max-width: 750px; line-height: 1.6; z-index: 1; }
.diploma-date { font-family: 'Times New Roman', Georgia, serif; font-size: 1rem; color: #2c3e2b; margin-top: 20px; z-index: 1; }
.diploma-signature-area { display: flex; flex-direction: column; align-items: center; margin-top: 15px; z-index: 1; }
.diploma-signature-img { width: 202px; height: auto; margin-bottom: -18px; position: relative; z-index: 2; }
.diploma-signature-line { width: 220px; border-top: 1px solid #333; margin-bottom: 6px; }
.diploma-signature-text { font-family: 'Times New Roman', Georgia, serif; font-size: 0.95rem; color: #2c3e2b; text-align: center; line-height: 1.4; }
.diploma-sello { position: absolute; bottom: 45px; left: 50px; width: 110px; height: 110px; object-fit: contain; z-index: 1; }
.diploma-qr-area { position: absolute; bottom: 40px; right: 50px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
.diploma-qr-text { font-size: 0.65rem; color: #555; text-align: center; line-height: 1.3; margin-top: 4px; }

/* CERTIFICADO VERTICAL - Carta 8.5x11in */
.cert-template { width: 8.5in; height: 11in; background: white; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
.cert-bar-top, .cert-bar-bottom { position: absolute; left: -2px; width: calc(100% + 4px); height: 28px; background: #1e3d28; }
.cert-bar-top { top: 0; }
.cert-bar-bottom { bottom: 0; }
.cert-inner { position: absolute; top: 28px; left: 0; right: 0; bottom: 28px; padding: 35px 55px; display: flex; flex-direction: column; align-items: center; }
.cert-logo { position: absolute; top: 42px; left: 55px; width: 75px; height: 75px; object-fit: contain; z-index: 2; }
.cert-header-text { position: absolute; top: 48px; left: 145px; z-index: 2; }
.cert-header-text .cert-header-name { font-family: 'Times New Roman', Georgia, serif; font-size: 1.3rem; color: #1e3d28; font-weight: 700; letter-spacing: 1px; }
.cert-header-text .cert-header-sub { font-family: 'Times New Roman', Georgia, serif; font-size: 0.65rem; color: #4a6651; letter-spacing: 2px; text-transform: uppercase; }
.cert-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; opacity: 0.06; pointer-events: none; z-index: 0; }
.cert-title { font-family: 'Times New Roman', Georgia, serif; font-size: 2.4rem; color: #1e3d28; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; margin-top: 110px; margin-bottom: 25px; z-index: 1; }
.cert-sub { font-family: 'Times New Roman', Georgia, serif; font-size: 1.2rem; color: #2a5536; margin-bottom: 25px; z-index: 1; }
.cert-name { font-family: 'Times New Roman', Georgia, serif; font-size: 2rem; color: #b8860b; font-weight: 700; margin: 10px 0 25px; z-index: 1; }
.cert-text { font-family: 'Times New Roman', Georgia, serif; font-size: 1.1rem; color: #2c3e2b; text-align: justify; text-align-last: center; max-width: 680px; line-height: 1.7; z-index: 1; }
.cert-text b { color: #1e3d28; }
.cert-date { font-family: 'Times New Roman', Georgia, serif; font-size: 1.1rem; color: #2c3e2b; margin-top: 35px; z-index: 1; }
.cert-signature-area { display: flex; flex-direction: column; align-items: center; margin-top: 20px; z-index: 1; }
.cert-signature-img { width: 202px; height: auto; margin-bottom: -18px; position: relative; z-index: 2; }
.cert-signature-line { width: 220px; border-top: 1px solid #333; margin-bottom: 6px; }
.cert-signature-text { font-family: 'Times New Roman', Georgia, serif; font-size: 0.95rem; color: #2c3e2b; text-align: center; line-height: 1.4; }
.cert-sello { position: absolute; bottom: 45px; left: 55px; width: 110px; height: 110px; object-fit: contain; z-index: 1; }
.cert-qr-area { position: absolute; bottom: 40px; right: 55px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
.cert-qr-text { font-size: 0.65rem; color: #555; text-align: center; line-height: 1.3; margin-top: 4px; }

@media (max-width: 900px) {
  .diploma-template:not(.no-transform) { transform: scale(0.55); transform-origin: top center; }
  .cert-template:not(.no-transform) { transform: scale(0.55); transform-origin: top center; }
}
.no-transform { transform: none !important; transform-origin: top left !important; }
</style>
</head>
<body>
<div class="container">
  <div class="search-panel">
    <h2>🎓 Emisión de Diplomas y Certificados</h2>
    <div id="authStatus" class="alert hidden"></div>
    <div id="errorStatus" class="alert alert-error hidden"></div>

    <div class="form-row">
      <div class="form-group">
        <label>📘 Filtrar por curso</label>
        <select id="courseFilter">
          <option value="">-- Todos los cursos --</option>
        </select>
      </div>
      <div class="form-group">
        <label>🔍 Buscar alumno (nombre / RUT / email)</label>
        <input type="text" id="searchInput" placeholder="Ej: 19.681.751-4 o nombre" autocomplete="off">
      </div>
      <div><button id="searchBtn">🔍 Buscar</button></div>
    </div>

    <div id="statsBar" class="stats-bar hidden"></div>
    <div id="resultsList" class="alumnos-list hidden">
      <div id="resultsContent"></div>
      <button id="loadMoreBtn" class="btn-loadmore hidden">⬇️ Cargar 5 más</button>
    </div>
  </div>

  <div id="previewDiplomaContainer" class="preview-area hidden">
    <div class="preview-title">📄 Vista Previa — Diploma de Honor (Horizontal)</div>
    <div class="diploma-template" id="diplomaTemplate"></div>
    <div class="actions">
      <button id="downloadDiplomaBtn" class="btn-outline">⬇️ Descargar Diploma PDF</button>
    </div>
  </div>

  <div id="previewCertContainer" class="preview-area hidden">
    <div class="preview-title">📜 Vista Previa — Certificado de Aprobación (Vertical)</div>
    <div class="cert-template" id="certTemplate"></div>
    <div class="actions">
      <button id="downloadCertBtn" class="btn-outline">⬇️ Descargar Certificado PDF</button>
    </div>
  </div>
</div>

<script>
// ========== IMÁGENES DESDE GITHUB RAW ==========
const IMG_LOGO = "https://raw.githubusercontent.com/INASEP/INASEPLMS/main/logo.png";
const IMG_FIRMA = "https://raw.githubusercontent.com/INASEP/INASEPLMS/main/firma.png";
const IMG_SELLO = "https://raw.githubusercontent.com/INASEP/INASEPLMS/main/sello.png";
const IMG_WATERMARK = "https://raw.githubusercontent.com/INASEP/INASEPLMS/main/logo.png";

// ========== FIREBASE ==========
const firebaseConfig = {
  apiKey: "AIzaSyDnzXP59rK49bmKbDeYX8oUtobVaKyI2A4",
  authDomain: "mi-lms-563bf.firebaseapp.com",
  projectId: "mi-lms-563bf",
  storageBucket: "mi-lms-563bf.firebasestorage.app",
  messagingSenderId: "303910884065",
  appId: "1:303910884065:web:5f2fe854e17fd25ed21da0"
};
try {
  firebase.initializeApp(firebaseConfig);
} catch(e) {
  console.log("Firebase ya inicializado:", e.message);
}
const auth = firebase.auth();
const db = firebase.firestore();

let _adminVerified = false; // No modificar desde consola
let selectedStudent = null;
let selectedCourseResult = null;
let diplomaToken = null;
let certToken = null;

let allResults = [];
let displayedCount = 0;
const PAGE_SIZE = 5;

const $ = id => document.getElementById(id);

function showError(msg) { $('errorStatus').textContent = msg; $('errorStatus').classList.remove('hidden'); }
function clearError() { $('errorStatus').classList.add('hidden'); }
function setLoading(isLoading) {
  $('searchBtn').disabled = isLoading;
  if (isLoading) {
    $('resultsList').classList.remove('hidden');
    $('resultsContent').innerHTML = '<div class="loading-box"><span class="spinner"></span> Consultando base de datos...</div>';
    $('loadMoreBtn').classList.add('hidden');
  }
}

// AUTENTICACIÓN
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    $('authStatus').innerHTML = '🔐 Debes iniciar sesión como administrador. <a href="#" onclick="auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())">Iniciar sesión con Google</a>';
    $('authStatus').classList.remove('hidden');
    $('searchBtn').disabled = true;
    return;
  }
  try {
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().role === 'admin') {
      _adminVerified = true;
      $('authStatus').classList.add('hidden');
      $('searchBtn').disabled = false;
      await loadCourses();
      await loadInitialData();
    } else {
      $('authStatus').innerHTML = '⛔ Acceso restringido. Solo administradores.';
      $('authStatus').classList.remove('hidden');
      $('searchBtn').disabled = true;
    }
  } catch (err) {
    showError('Error al verificar permisos: ' + err.message);
    $('searchBtn').disabled = true;
  }
});

// CARGAR CURSOS PARA EL FILTRO
async function loadCourses() {
  if (!_adminVerified) return;
  try {
    const snapshot = await db.collection('courses').get();
    const select = $('courseFilter');
    snapshot.forEach(doc => {
      const data = doc.data();
      const option = document.createElement('option');
      option.value = doc.id;
      option.textContent = data.title || 'Curso sin nombre';
      select.appendChild(option);
    });
  } catch (err) {
    console.error('Error cargando cursos:', err);
  }
}

// CARGA INICIAL DE DATOS (sin índice compuesto)
async function loadInitialData() {
  if (!_adminVerified) return;
  setLoading(true); clearError();
  try {
    const resultsSnap = await db.collection('quizResults').get();

    const userCourseBest = new Map();
    resultsSnap.forEach(doc => {
      const r = doc.data();
      if ((r.percentage || 0) < 60) return;
      const key = r.userId + '_' + r.courseId;
      if (!userCourseBest.has(key) || userCourseBest.get(key).percentage < r.percentage) {
        userCourseBest.set(key, { ...r, resultId: doc.id });
      }
    });

    const userIds = [...new Set([...userCourseBest.values()].map(r => r.userId))];
    const userMap = new Map();
    for (const uid of userIds) {
      try {
        const udoc = await db.collection('users').doc(uid).get();
        if (udoc.exists) userMap.set(uid, udoc.data());
      } catch(e){}
    }

    const courseIds = [...new Set([...userCourseBest.values()].map(r => r.courseId))];
    const courseMap = new Map();
    for (const cid of courseIds) {
      try {
        const cdoc = await db.collection('courses').doc(cid).get();
        if (cdoc.exists) courseMap.set(cid, cdoc.data());
      } catch(e){}
    }

    allResults = [];
    for (const [key, result] of userCourseBest) {
      const user = userMap.get(result.userId);
      if (!user || user.role !== 'student') continue;
      const course = courseMap.get(result.courseId) || { title: 'Curso' };
      allResults.push({
        uid: result.userId,
        name: user.name || 'Sin nombre',
        rut: user.rut || '',
        email: user.email || '',
        courseId: result.courseId,
        courseTitle: course.title || 'Curso',
        percentage: result.percentage,
        score: result.score + '/' + result.total,
        resultId: result.resultId
      });
    }

    allResults.sort((a, b) => a.name.localeCompare(b.name));
    applyFilters();

  } catch (err) {
    showError('Error al cargar datos: ' + err.message);
    $('resultsContent').innerHTML = '';
  }
}

// APLICAR FILTROS Y MOSTRAR
function applyFilters() {
  const courseFilter = $('courseFilter').value;
  const searchQuery = $('searchInput').value.trim().toLowerCase();

  let filtered = allResults;

  if (courseFilter) {
    filtered = filtered.filter(r => r.courseId === courseFilter);
  }

  if (searchQuery) {
    filtered = filtered.filter(r => 
      r.name.toLowerCase().includes(searchQuery) ||
      (r.rut && r.rut.toLowerCase().includes(searchQuery)) ||
      (r.email && r.email.toLowerCase().includes(searchQuery))
    );
  }

  $('statsBar').classList.remove('hidden');
  const courseText = $('courseFilter').value ? $('courseFilter').options[$('courseFilter').selectedIndex].text : 'Todos';
  $('statsBar').innerHTML = `
    <div>📊 <span>${allResults.length}</span> aprobados totales</div>
    <div>🔍 <span>${filtered.length}</span> mostrando</div>
    <div>📘 Curso: <span>${courseText}</span></div>
  `;

  displayedCount = 0;
  renderPage(filtered);
}

// RENDERIZAR PÁGINA
function renderPage(filtered) {
  const toShow = filtered.slice(0, displayedCount + PAGE_SIZE);
  displayedCount = toShow.length;

  let html = '';
  for (const r of toShow) {
    html += `<div class="alumno-item" 
      data-uid="${escapeHtml(r.uid)}"
      data-name="${escapeHtml(r.name)}"
      data-rut="${escapeHtml(r.rut)}"
      data-email="${escapeHtml(r.email)}"
      data-courseid="${escapeHtml(r.courseId)}"
      data-coursetitle="${escapeHtml(r.courseTitle)}"
      data-percentage="${r.percentage}"
      data-score="${escapeHtml(r.score)}">
      <div class="alumno-info"><h4>${escapeHtml(r.name)}</h4><p>${escapeHtml(r.rut) || 'Sin RUT'} | ${escapeHtml(r.email)}</p></div>
      <span class="badge">✅ ${escapeHtml(r.courseTitle)} — ${r.percentage}%</span>
    </div>`;
  }

  if (toShow.length === 0) {
    $('resultsContent').innerHTML = '<div class="loading-box">No se encontraron resultados con estos filtros.</div>';
  } else {
    $('resultsContent').innerHTML = html;
  }

  if (displayedCount < filtered.length) {
    $('loadMoreBtn').classList.remove('hidden');
    $('loadMoreBtn').textContent = `⬇️ Cargar 5 más (${filtered.length - displayedCount} restantes)`;
  } else {
    $('loadMoreBtn').classList.add('hidden');
  }

  attachClickHandlers();
}

// CARGAR MÁS
$('loadMoreBtn').addEventListener('click', () => {
  applyFilters();
});

// EVENTOS DE FILTRO
$('courseFilter').addEventListener('change', () => applyFilters());
$('searchBtn').addEventListener('click', () => applyFilters());
$('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilters(); });

// CLICK EN ALUMNO
function attachClickHandlers() {
  document.querySelectorAll('.alumno-item').forEach(el => {
    el.addEventListener('click', async () => {
      selectedStudent = {
        uid: el.dataset.uid,
        name: el.dataset.name,
        rut: el.dataset.rut,
        email: el.dataset.email
      };
      selectedCourseResult = {
        courseId: el.dataset.courseid,
        courseTitle: el.dataset.coursetitle,
        percentage: Math.min(100, Math.max(0, parseInt(el.dataset.percentage) || 0)),
        score: el.dataset.score,
        date: new Date()
      };
      await generateBothDocuments();
    });
  });
}

// GENERAR DOCUMENTOS
async function generateBothDocuments() {
  if (!_adminVerified) { showError('⛔ Acceso no autorizado.'); return; }
  const student = selectedStudent;
  const course = selectedCourseResult;
  if (!student || !course) return;
  clearError();

  // Tokens criptográficamente aleatorios (no predecibles)
  const _uuid = () => (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID().replace(/-/g,'')
    : Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
  diplomaToken = 'DIP_' + _uuid().substring(0, 24);
  certToken    = 'CERT_' + _uuid().substring(0, 24);

  // URL base para el QR - funciona en GitHub Pages y subdirectorios
  const pathBase = window.location.pathname.endsWith('/')
    ? window.location.pathname
    : window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
  const baseUrl = window.location.origin + pathBase;
  const diplomaUrl = `${baseUrl}verificar.html?id=${diplomaToken}`;
  const certUrl = `${baseUrl}verificar.html?id=${certToken}`;

  // Determinar carga horaria según tipo de curso
  const titleLower = (course.courseTitle || '').toLowerCase();
  const horas = titleLower.includes('operador') ? 36 : 120;
  const horasLabel = horas === 36 ? '36 horas' : '120 horas';

  const commonData = {
    studentId: student.uid,
    studentName: student.name,
    studentRut: student.rut,
    studentEmail: student.email,
    courseId: course.courseId,
    courseName: course.courseTitle,
    percentage: course.percentage,
    score: course.score,
    issuedAt: firebase.firestore.FieldValue.serverTimestamp(),
    hours: horas
  };

  const hoy = new Date();
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fechaStr = `${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
  const fechaStrCert = `Quilpué, ${String(hoy.getDate()).padStart(2,'0')} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;

  // DIPLOMA
  const diplomaDiv = $('diplomaTemplate');

// ── HELPER: generar QR como <img> base64 (evita canvas CORS en html2canvas) ──
function generarQRComoImagen(container, url, size) {
  return new Promise((resolve) => {
    container.innerHTML = '';
    const tempDiv = document.createElement('div');
    document.body.appendChild(tempDiv);
    const qr = new QRCode(tempDiv, {
      text: url,
      width: size,
      height: size,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => {
      const canvas = tempDiv.querySelector('canvas');
      if (canvas) {
        const dataUrl = canvas.toDataURL('image/png');
        const img = document.createElement('img');
        img.src = dataUrl;
        img.width = size;
        img.height = size;
        img.style.display = 'block';
        container.appendChild(img);
      }
      document.body.removeChild(tempDiv);
      resolve();
    }, 200);
  });
}

// ── HELPER: descargar documento como PDF exacto (sin cortes, centrado) ──
async function descargarDocumentoPDF(elementId, filename, widthIn, heightIn, orientation) {
  const el = document.getElementById(elementId);

  // Neutralizar transform del media query ANTES de que html2pdf capture
  el.classList.add('no-transform');
  el.style.boxShadow = 'none';
  el.style.margin = '0';

  // Esperar a que el browser aplique los estilos
  await new Promise(r => setTimeout(r, 200));

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      letterRendering: true,
      logging: false,
      scrollX: 0,
      scrollY: 0
    },
    jsPDF: {
      unit: 'in',
      format: [widthIn, heightIn],
      orientation: orientation,
      compress: true
    }
  };

  try {
    await html2pdf().set(opt).from(el).save();
  } finally {
    el.classList.remove('no-transform');
    el.style.boxShadow = '';
    el.style.margin = '';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
