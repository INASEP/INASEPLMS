<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Cursos Online</title>

    <!-- Firebase SDKs (solo Auth y Firestore, sin Storage) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #c8102e;
            --primary-dark: #a00d25;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #252540;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #e0e0e0;
            --success: #27ae60;
            --warning: #f39c12;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== LOGO ========== */
        .logo-container {
            text-align: center;
            padding: 18px 20px 10px 20px;
            background: white;
            border-bottom: 1px solid var(--border);
        }
        .logo-container img {
            max-height: 60px;
            max-width: 100%;
            object-fit: contain;
        }

        /* ========== LOGIN / REGISTRO ========== */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
            flex-direction: column;
        }
        .auth-container .logo-container {
            background: transparent;
            border: none;
            margin-bottom: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-card .logo {
            text-align: center;
            margin-bottom: 10px;
        }
        .auth-card .logo h1 {
            font-size: 28px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .auth-card .logo .subtitle {
            color: var(--text-light);
            font-size: 14px;
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 20px;
            color: #1a1a2e;
        }
        .auth-card .form-group {
            margin-bottom: 16px;
        }
        .auth-card label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .auth-card input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: var(--transition);
            background: #fafafa;
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.08);
        }

        .btn {
            display: inline-block;
            padding: 11px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 13px;
            font-size: 15px;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(200, 16, 46, 0.3);
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 6px; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: #555; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }

        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-light);
        }
        .auth-toggle a {
            color: var(--primary);
            cursor: pointer; font-weight: 600; text-decoration: none;
        }
        .auth-toggle a:hover { text-decoration: underline; }

        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: none; font-weight: 500; }
        .alert-error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
        .alert-success { background: #eafaf1; color: #1e7e34; border: 1px solid #c3e6cb; }

        /* ========== DASHBOARD LAYOUT ========== */
        .dashboard { display: flex; flex-direction: column; min-height: 100vh; }
        .dashboard-header {
            display: flex; align-items: center; background: white;
            border-bottom: 1px solid var(--border); padding: 10px 20px; flex-wrap: wrap; gap: 10px;
        }
        .dashboard-header .logo-container { padding: 0; margin-right: auto; border: none; }
        .dashboard-body { display: flex; flex: 1; }

        .sidebar {
            width: 260px; background: var(--sidebar-bg); color: #ccc;
            display: flex; flex-direction: column; position: fixed;
            top: 0; left: 0; bottom: 0; z-index: 100; transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 22px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header h3 { color: #fff; font-size: 18px; letter-spacing: -0.3px; }
        .sidebar-header .role-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
            font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-left: auto;
        }
        .role-admin { background: rgba(200,16,46,0.25); color: #f8717f; }
        .role-student { background: rgba(39,174,96,0.25); color: #5ddb92; }

        .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px; padding: 11px 20px;
            color: #b0b0b0; text-decoration: none; font-size: 14px; transition: var(--transition);
            cursor: pointer; border-left: 3px solid transparent;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--sidebar-hover); color: #fff; border-left-color: var(--primary);
        }
        .sidebar-nav a .icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar-footer button {
            width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
            color: #ccc; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .sidebar-footer button:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .main-content {
            flex: 1; margin-left: 260px; padding: 28px 32px; min-height: calc(100vh - 80px);
        }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 24px; font-weight: 700; color: #1a1a2e; }
        .page-header .breadcrumb { font-size: 13px; color: var(--text-light); margin-top: 2px; }
        .breadcrumb a { color: var(--primary); cursor: pointer; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .card {
            background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
            padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .card-header h3 { font-size: 17px; font-weight: 600; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .course-card {
            background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
            border: 1px solid var(--border); overflow: hidden; transition: var(--transition); cursor: pointer;
        }
        .course-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .course-card .card-img {
            height: 140px; background: linear-gradient(135deg, #e8e8e8 0%, #d5d5d5 100%);
            display: flex; align-items: center; justify-content: center; font-size: 50px; color: #aaa;
        }
        .course-card .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .course-card .card-body { padding: 16px 18px; }
        .course-card .card-body h4 { font-size: 16px; margin-bottom: 6px; color: #1a1a2e; }
        .course-card .card-body p {
            font-size: 13px; color: var(--text-light);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .course-card .card-footer {
            padding: 10px 18px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; flex-wrap: wrap;
        }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
        tr:hover td { background: #fafafa; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: #fff; border-radius: 14px; padding: 28px 30px;
            width: 95%; max-width: 700px; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
        }
        .modal h3 { margin-bottom: 18px; font-size: 19px; }
        .modal .form-group { margin-bottom: 14px; }
        .modal label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #555; }
        .modal input, .modal textarea, .modal select {
            width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0;
            border-radius: 7px; font-size: 14px; font-family: inherit; resize: vertical;
        }
        .modal input:focus, .modal textarea:focus {
            border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(200,16,46,0.06);
        }
        .modal textarea { min-height: 200px; font-family: 'Courier New', monospace; font-size: 13px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #e6f9ee; color: #1a7a3a; }
        .badge-gray { background: #f0f0f0; color: #666; }
        .badge-blue { background: #e6f0ff; color: #1a56db; }

        .lesson-content {
            padding: 20px; background: #fdfdfd; border-radius: 10px;
            border: 1px solid #eee; line-height: 1.8; font-size: 15px;
        }
        .lesson-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; }

        .quiz-question {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 12px;
        }
        .quiz-question p { margin-bottom: 10px; font-weight: 500; }
        .quiz-options { display: flex; gap: 20px; }
        .quiz-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: normal; font-size: 14px; }

        .result-box {
            background: #f0fdf4; border: 2px solid #27ae60; border-radius: 12px;
            padding: 24px; text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 20px;
        }
        .hidden { display: none !important; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .mb-1 { margin-bottom: 8px; }
        .mb-2 { margin-bottom: 16px; }
        .mt-2 { margin-top: 16px; }
        .gap-2 { gap: 8px; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .ml-2 { margin-left: 8px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px 16px; }
            .grid { grid-template-columns: 1fr; }
            .mobile-menu-btn { display: block !important; }
        }
        .mobile-menu-btn {
            display: none; position: fixed; top: 14px; left: 14px; z-index: 200;
            background: var(--sidebar-bg); color: #fff; border: none;
            width: 40px; height: 40px; border-radius: 8px; font-size: 20px; cursor: pointer;
        }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty-state .icon { font-size: 60px; }
    </style>
</head>
<body>

    <!-- ==================== LOGIN / REGISTRO ==================== -->
    <div id="authSection" class="auth-container">
        <!-- Logo desde GitHub Pages (ruta relativa) -->
        <div class="logo-container">
            <img id="mainLogo" src="logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="auth-card">
            <div class="logo"><h1>📚 MiLMS</h1><p class="subtitle">Plataforma de Cursos Online</p></div>
            <div id="alertAuth" class="alert"></div>

            <div id="loginForm">
                <h2>Iniciar Sesión</h2>
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="correo@ejemplo.com"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
                <button class="btn btn-primary" onclick="login()">Ingresar</button>
                <p class="auth-toggle">¿No tienes cuenta? <a onclick="showRegister()">Regístrate como alumno</a></p>
            </div>

            <div id="registerForm" class="hidden">
                <h2>Registro de Alumno</h2>
                <div class="form-group"><label>Nombre completo</label><input type="text" id="regName" placeholder="Tu nombre"></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="correo@ejemplo.com"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="regPassword" placeholder="Mínimo 6 caracteres"></div>
                <button class="btn btn-primary" onclick="register()">Crear Cuenta</button>
                <p class="auth-toggle">¿Ya tienes cuenta? <a onclick="showLogin()">Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <!-- ==================== DASHBOARD ==================== -->
    <div id="dashboardSection" class="dashboard hidden">
        <div class="dashboard-header">
            <div class="logo-container">
                <img id="dashLogo" src="logo.png" alt="Logo" onerror="this.style.display='none'" style="max-height:50px;">
            </div>
            <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                <span id="userDisplayName" style="font-weight:600;"></span>
            </div>
        </div>
        <div class="dashboard-body">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>📚 MiLMS</h3>
                    <span id="sidebarRole" class="role-badge"></span>
                </div>
                <nav class="sidebar-nav" id="sidebarNav"></nav>
                <div class="sidebar-footer">
                    <button onclick="logout()">🚪 Cerrar Sesión</button>
                </div>
            </div>
            <div class="main-content" id="mainContent"></div>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script>
        // ==================== CONFIGURACIÓN FIREBASE ====================
     const firebaseConfig = {
  apiKey: "AIzaSyDnzXP59rK49bmKbDeYX8oUtobVaKyI2A4",
  authDomain: "mi-lms-563bf.firebaseapp.com",
  projectId: "mi-lms-563bf",
  storageBucket: "mi-lms-563bf.firebasestorage.app",
  messagingSenderId: "303910884065",
  appId: "1:303910884065:web:5f2fe854e17fd25ed21da0"
};

        // Inicializar Firebase (sin Storage)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== ESTADO GLOBAL ====================
        let currentUser = null;
        let currentRole = null;
        let currentRoute = '';

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userDisplayName').textContent = user.displayName || user.email;
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        currentRole = userDoc.data().role;
                    } else {
                        currentRole = 'student';
                        await db.collection('users').doc(user.uid).set({
                            uid: user.uid, email: user.email,
                            name: user.displayName || user.email.split('@')[0],
                            role: 'student', enrolledCourses: [],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    showDashboard();
                } catch (err) {
                    console.error(err);
                    showDashboard();
                }
            } else {
                currentUser = null; currentRole = null; showAuth();
            }
        });

        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('alertAuth').style.display = 'none';
        }
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        function showAlert(msg, type='error') {
            const el = document.getElementById('alertAuth');
            el.textContent = msg; el.className = 'alert alert-'+type; el.style.display='block';
            setTimeout(()=> el.style.display='none', 5000);
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            if(!email||!pass) return showAlert('Completa todos los campos.');
            try { await auth.signInWithEmailAndPassword(email,pass); }
            catch(err){ showAlert('Error: '+traducirError(err.code)); }
        }
        async function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            if(!name||!email||!pass) return showAlert('Completa todos los campos.');
            if(pass.length<6) return showAlert('La contraseña debe tener al menos 6 caracteres.');
            try {
                const cred = await auth.createUserWithEmailAndPassword(email,pass);
                await db.collection('users').doc(cred.user.uid).set({
                    uid:cred.user.uid, email, name, role:'student', enrolledCourses:[],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await cred.user.updateProfile({displayName:name});
            } catch(err){ showAlert('Error: '+traducirError(err.code)); }
        }
        async function logout() {
            await auth.signOut(); currentUser=null; currentRole=null; closeModal(); showAuth(); window.location.hash='';
        }
        function traducirError(code){
            const m = {
                'auth/email-already-in-use':'Este email ya está registrado.',
                'auth/invalid-email':'Email inválido.',
                'auth/user-not-found':'Usuario no encontrado.',
                'auth/wrong-password':'Contraseña incorrecta.',
                'auth/invalid-credential':'Credenciales inválidas.',
                'auth/weak-password':'Contraseña muy débil (mínimo 6 caracteres).',
                'auth/too-many-requests':'Demasiados intentos.'
            };
            return m[code]||'Error inesperado.';
        }

        function showDashboard() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            updateSidebar(); handleRoute();
        }
        function updateSidebar(){
            const nav = document.getElementById('sidebarNav');
            const badge = document.getElementById('sidebarRole');
            nav.innerHTML = '';
            if(currentRole==='admin'){
                badge.textContent='Admin'; badge.className='role-badge role-admin';
                nav.innerHTML = `
                    <a href="#admin/courses" data-route="admin/courses"><span class="icon">📁</span> Cursos</a>
                    <a href="#admin/students" data-route="admin/students"><span class="icon">👥</span> Alumnos</a>`;
            } else {
                badge.textContent='Alumno'; badge.className='role-badge role-student';
                nav.innerHTML = `<a href="#student/courses" data-route="student/courses"><span class="icon">📚</span> Mis Cursos</a>`;
            }
        }
        function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

        window.addEventListener('hashchange', handleRoute);
        function handleRoute(){
            const hash = window.location.hash.replace('#','') || (currentRole==='admin'?'admin/courses':'student/courses');
            currentRoute = hash; updateActiveNav(hash); closeModal();
            const main = document.getElementById('mainContent');

            if(hash.startsWith('admin/courses') && currentRole==='admin'){
                if(hash==='admin/courses') renderAdminCourses(main);
                else if(hash.match(/^admin\/courses\/([^/]+)$/)) renderAdminCourseDetail(main, RegExp.$1);
                else if(hash.match(/^admin\/courses\/([^/]+)\/lessons\/([^/]+)$/)) renderAdminLessonEdit(main, RegExp.$1, RegExp.$2);
                else if(hash.match(/^admin\/courses\/([^/]+)\/quizzes$/)) renderAdminQuizzes(main, RegExp.$1);
            } else if(hash==='admin/students' && currentRole==='admin'){
                renderAdminStudents(main);
            } else if(hash.startsWith('student/courses') && currentRole==='student'){
                if(hash==='student/courses') renderStudentCourses(main);
                else if(hash.match(/^student\/courses\/([^/]+)$/)) renderStudentCourseDetail(main, RegExp.$1);
                else if(hash.match(/^student\/courses\/([^/]+)\/lessons\/([^/]+)$/)) renderStudentLesson(main, RegExp.$1, RegExp.$2);
                else if(hash.match(/^student\/courses\/([^/]+)\/quiz\/([^/]+)$/)) renderStudentQuiz(main, RegExp.$1, RegExp.$2);

                        <label><input type="radio" name="q${i}" value="true" ${q.correctAnswer===true?'checked':''}> Verdadero</label>

        function addQuizQuestion(){
            const container=document.getElementById('quizQuestionsContainer');
            const idx=container.querySelectorAll('.quiz-question').length;
            const div=document.createElement('div'); div.className='quiz-question'; div.style.background='#fafafa'; div.style.marginBottom='8px';
            div.innerHTML=`<div class="flex justify-between items-center mb-1"><strong>Pregunta ${idx+1}</strong>
                <button class="btn btn-sm btn-danger" onclick="removeQuizQuestion(this)">X</button></div>
                <input type="text" class="quiz-q-text" placeholder="Pregunta" style="margin-bottom:6px;">
                <div class="quiz-options">
                    <label><input type="radio" name="q${idx}" value="true" checked> Verdadero</label>

        function removeQuizQuestion(btn){ const c=document.getElementById('quizQuestionsContainer'); if(c.querySelectorAll('.quiz-question').length<=1)return; btn.closest('.quiz-question').remove(); }
        async function saveQuiz(quizId, courseId){
            const title=document.getElementById('quizTitle').value.trim();
            if(!title) return alert('Título obligatorio.');
            const divs=document.querySelectorAll('#quizQuestionsContainer .quiz-question');
            const questions=[];
            divs.forEach(div=>{
                const text=div.querySelector('.quiz-q-text').value.trim();
                const radioTrue=div.querySelector('input[value="true"]');
                if(text) questions.push({question:text, correctAnswer: radioTrue.checked});
            });
            if(questions.length===0) return alert('Mínimo una pregunta.');
            const data={title,questions,courseId,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
            if(quizId){ await db.collection('quizzes').doc(quizId).update(data); }
            else { data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); await db.collection('quizzes').add(data); }
            closeModal(); handleRoute();
        }

            const batch=db.batch();
            const rSnap=await db.collection('quizResults').where('quizId','==',qId).get(); rSnap.docs.forEach(d=>batch.delete(d.ref));

                <div class="quiz-options"><label><input type="radio" name="q${i}" value="true"> Verdadero</label>
                <label><input type="radio" name="q${i}" value="false"> Falso</label></div></div>`).join('')}
                <div class="text-center mt-2"><button class="btn btn-primary" onclick="submitQuiz('${quizId}','${courseId}')" style="width:auto;">Enviar</button></div></div>`;
        }
        async function submitQuiz(quizId, courseId){
            const qDoc=await db.collection('quizzes').doc(quizId).get();
            if(!qDoc.exists) return;
            const quiz=qDoc.data();
            const questions=quiz.questions||[];
            let correctas=0; const respuestas=[];
            for(let i=0;i<questions.length;i++){
                const rTrue=document.querySelector(`input[name="q${i}"][value="true"]`);
                const rFalse=document.querySelector(`input[name="q${i}"][value="false"]`);
                let uAns=null;
                if(rTrue&&rTrue.checked) uAns=true; else if(rFalse&&rFalse.checked) uAns=false;
                respuestas.push({question:questions[i].question, userAnswer:uAns, correctAnswer:questions[i].correctAnswer});
                if(uAns===questions[i].correctAnswer) correctas++;
            }
            const total=questions.length;
            const porcentaje=Math.round((correctas/total)*100);
            const resultRef=await db.collection('quizResults').add({
                userId:currentUser.uid, quizId, courseId, score:correctas, total, percentage:porcentaje,
                respuestas, createdAt:firebase.firestore.FieldValue.serverTimestamp()
            });
            navigate(`student/courses/${courseId}/quiz/${quizId}/result?id=${resultRef.id}`);
        }
        async function renderStudentQuizResult(container, courseId, quizId){
            const params=new URLSearchParams(window.location.hash.split('?')[1]||'');
            const resultId=params.get('id');
            let rData=null;
            if(resultId){ const d=await db.collection('quizResults').doc(resultId).get(); if(d.exists) rData=d.data(); }
            if(!rData){
                const snap=await db.collection('quizResults').where('userId','==',currentUser.uid).where('quizId','==',quizId).orderBy('createdAt','desc').limit(1).get();
                if(!snap.empty) rData=snap.docs[0].data();
            }
            if(!rData){ container.innerHTML='<div class="empty-state"><p>Sin resultado.</p></div>'; return; }
            const qDoc=await db.collection('quizzes').doc(quizId).get();
            const quizTitle=qDoc.exists?qDoc.data().title:'Examen';
            const ap=rData.percentage>=60;
            container.innerHTML=`<div class="page-header"><h2>Resultado: ${quizTitle}</h2></div>
                <div class="result-box" style="border-color:${ap?'#27ae60':'#e74c3c'}; background:${ap?'#f0fdf4':'#fef2f2'};">
                    <div style="font-size:48px;">${ap?'🎉':'😞'}</div>
                    <div style="font-size:36px; color:${ap?'#27ae60':'#e74c3c'};">${rData.percentage}%</div>
                    <p>${rData.score} de ${rData.total} correctas</p>
                </div>
                <div class="card"><h3>Detalle</h3>${(rData.respuestas||[]).map((r,i)=>`<div class="quiz-question" style="border-left:4px solid ${r.userAnswer===r.correctAnswer?'#27ae60':'#e74c3c'};"><p><strong>${i+1}. ${r.question}</strong></p><p>Tu respuesta: <strong>${r.userAnswer===null?'Sin responder':r.userAnswer?'Verdadero':'Falso'}</strong></p><p>Correcta: <strong style="color:#27ae60;">${r.correctAnswer?'Verdadero':'Falso'}</strong></p></div>`).join('')}</div>
                <div class="flex gap-2 mt-2 justify-center"><button class="btn btn-outline" onclick="navigate('student/courses/${courseId}')">Volver</button><button class="btn btn-primary" onclick="navigate('student/courses/${courseId}/quiz/${quizId}')">Reintentar</button></div>`;
        }

        if(!window.location.hash) window.location.hash='';
    </script>
</body>
</html>
