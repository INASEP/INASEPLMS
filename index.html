<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INASEP — Plataforma de Formación</title>

    <!-- ══ CABECERAS DE SEGURIDAD ══
         NOTA: Las cabeceras HTTP (X-Frame-Options, X-Content-Type-Options, HSTS)
         son más efectivas configuradas en el servidor. En GitHub Pages puedes
         aproximarlas con _headers (Cloudflare Pages) o usar Cloudflare como proxy.
         El meta CSP de abajo actúa como segunda línea de defensa en cliente.
    -->
    <!-- Content Security Policy — restringe orígenes permitidos -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://apis.google.com;
                   style-src  'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
                   font-src   'self' https://fonts.gstatic.com;
                   img-src    'self' data: https: blob:;
                   connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com wss://*.firebaseio.com;
                   frame-src  'none';
                   object-src 'none';
                   base-uri   'self';">
    <!-- Evita que la página sea embebida en iframes (click-jacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <!-- Evita que el navegador interprete archivos con MIME incorrecto -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- Deshabilita detección de teléfonos en iOS que podría derivar a phishing -->
    <meta name="format-detection" content="telephone=no">
    <!-- No indexar en buscadores (plataforma privada) -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Firebase SDKs — cargados desde dominio oficial de Google -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" crossorigin="anonymous"></script>

    <!-- Quill — editor simple para descripción del curso -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <!-- TinyMCE — editor de contenido rico (usado en lecciones) -->
    <script src="https://cdn.jsdelivr.net/npm/tinymce@7.7.2/tinymce.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            /* ── Paleta INASEP ── */
            --green-900: #0d1f14;
            --green-800: #142a1b;
            --green-700: #1e3d28;
            --green-600: #2a5536;
            --green-500: #3d7a4e;   /* tono medio del logo */
            --green-400: #4a8c5c;   /* principal */
            --green-300: #68a87a;
            --green-200: #9fcfab;
            --green-100: #d4edda;
            --green-50:  #f0f8f2;

            --primary:      #4a8c5c;
            --primary-dark: #3d7a4e;
            --primary-light:#68a87a;
            --accent:       #8fbc8f; /* toque plateado-verdoso del globo */

            --sidebar-bg:   #0d1f14;
            --sidebar-nav:  #142a1b;
            --sidebar-hover:#1e3d28;
            --sidebar-border: rgba(255,255,255,0.07);

            --bg:       #f4f7f5;
            --card-bg:  #ffffff;
            --text:     #1a2e1e;
            --text-mid: #4a6651;
            --text-light:#7a9880;
            --border:   #d6e8da;

            --success: #27ae60;
            --warning: #e67e22;
            --danger:  #c0392b;
            --info:    #2980b9;

            --radius:  10px;
            --radius-lg: 16px;
            --shadow:  0 2px 14px rgba(13,31,20,0.08);
            --shadow-md: 0 6px 24px rgba(13,31,20,0.13);
            --transition: 0.18s ease;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Sora', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 15px;
        }


        /* ── Quill editor (descripción de cursos) ── */
        .ql-toolbar.ql-snow {
            border: 2px solid var(--border) !important;
            border-radius: 8px 8px 0 0 !important;
            background: var(--green-50) !important;
            font-family: 'Sora', sans-serif !important;
        }
        .ql-container.ql-snow {
            border: 2px solid var(--border) !important;
            border-top: none !important;
            border-radius: 0 0 8px 8px !important;
            font-family: 'Sora', sans-serif !important;
            font-size: 14px !important;
        }
        .ql-editor { min-height: 160px; line-height: 1.7; }
        .ql-editor.ql-blank::before { color: var(--text-light); font-style: normal; }
        /* ═══════════════════════════════
           AUTH  –  pantalla de ingreso
        ═══════════════════════════════ */
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: var(--green-900);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(74,140,92,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(143,188,143,0.10) 0%, transparent 50%);
        }
        .auth-card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo img {
            height: 80px;
            object-fit: contain;
        }
        .auth-logo .brand {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-mid);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        .auth-card h2 {
            font-size: 19px;
            font-weight: 700;
            color: var(--green-900);
            margin-bottom: 22px;
            text-align: center;
        }

        /* ═══════════════════════════════
           FORMULARIOS genéricos
        ═══════════════════════════════ */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-mid);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 13px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: #fafcfb;
            color: var(--text);
            transition: var(--transition);
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74,140,92,0.12);
        }
        .form-group textarea { min-height: 200px; font-family: 'DM Mono', monospace; font-size: 13px; }

        /* CKEditor custom styling */
        .cke_editor {
            border-radius: 8px !important;
            border: 2px solid var(--border) !important;
        }
        .cke_top {
            background: var(--green-50) !important;
            border-bottom: 1px solid var(--border) !important;
            border-radius: 8px 8px 0 0 !important;
        }
        .cke_bottom {
            background: var(--green-50) !important;
            border-top: 1px solid var(--border) !important;
        }
        .cke_contents {
            border-radius: 0 0 8px 8px !important;
        }

        /* Estilos para contenido renderizado */
        .lesson-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
        }
        .lesson-content table th {
            background: var(--green-50);
            font-weight: 600;
            text-align: left;
            padding: 10px 12px;
            border: 1px solid var(--border);
        }
        .lesson-content table td {
            padding: 10px 12px;
            border: 1px solid var(--border);
        }
        .lesson-content table tr:nth-child(even) {
            background: #fafcfb;
        }
        .lesson-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 16px 0;
            box-shadow: var(--shadow);
        }
        .lesson-content ul, .lesson-content ol {
            margin: 12px 0 12px 24px;
        }
        .lesson-content li {
            margin: 6px 0;
        }
        .lesson-content blockquote {
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            margin: 16px 0;
            background: var(--green-50);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .lesson-content h2 {
            font-size: 22px;
            margin-top: 28px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }
        .lesson-content h3 {
            font-size: 18px;
            margin-top: 22px;
        }
        .lesson-content p {
            margin: 12px 0;
            line-height: 1.8;
        }
        .lesson-content a {
            color: var(--primary);
            text-decoration: underline;
        }
        .lesson-content strong {
            color: var(--green-900);
        }

        /* Estilos para botón de subida en CKEditor */
        .cke_button__uploadimage_icon {
            background-size: 16px !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }

        /* Indicador de subida */
        .upload-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 24px 32px;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            z-index: 10000;
            text-align: center;
            display: none;
        }
        .upload-progress.active {
            display: block;
        }
        .upload-progress .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .form-group small { display:block; margin-top:5px; font-size:12px; color: var(--text-light); }

        /* ═══════════════════════════════
           BOTONES
        ═══════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(74,140,92,0.35);
            transform: translateY(-1px);
        }
        .btn-primary-full {
            width: 100%;
            justify-content: center;
            padding: 13px 20px;
            font-size: 15px;
        }
        .btn-secondary {
            background: #eef3f0;
            color: var(--text-mid);
        }
        .btn-secondary:hover { background: #dde8e1; }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-mid);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-warning:hover { background: #ca6f1e; }
        .btn-sm { padding: 6px 13px; font-size: 12px; border-radius: 6px; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

        /* ═══════════════════════════════
           ALERTAS
        ═══════════════════════════════ */
        .alert {
            padding: 11px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            margin-bottom: 16px;
            border-left: 4px solid;
        }
        .alert-error   { background:#fdecea; color:#9b2335; border-color:#e74c3c; }
        .alert-success { background:#eafaf1; color:#1e7e34; border-color:#27ae60; }

        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-light);
        }
        .auth-toggle a {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-toggle a:hover { text-decoration: underline; }

        /* ═══════════════════════════════
           LAYOUT DASHBOARD
        ═══════════════════════════════ */
        .dashboard { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 200;
            transition: transform 0.28s cubic-bezier(.4,0,.2,1);
            overflow: hidden;
        }
        .sidebar-top {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-top img {
            height: 44px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .sidebar-top .info { flex: 1; min-width: 0; }
        .sidebar-top .info h3 {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-top .info .role-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 3px;
        }
        .role-admin   { background: rgba(74,140,92,0.3); color: var(--green-200); }
        .role-student { background: rgba(143,188,143,0.2); color: var(--accent); }

        .sidebar-user {
            padding: 12px 20px;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-user .user-name {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user .user-email {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 20px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            border-left: 3px solid transparent;
            margin: 1px 0;
        }
        .sidebar-nav a:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }
        .sidebar-nav a.active {
            background: rgba(74,140,92,0.18);
            color: #fff;
            border-left-color: var(--primary);
        }
        .sidebar-nav a .nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--sidebar-border);
        }
        .sidebar-footer button {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.65);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-footer button:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        /* Topbar + contenido */
        .main-wrapper {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 6px rgba(13,31,20,0.06);
        }
        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-right: auto;
        }
        .topbar-user {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-mid);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--green-500);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            padding: 28px 32px;
        }

        /* ═══════════════════════════════
           BOTÓN MENÚ MÓVIL
        ═══════════════════════════════ */
        .mob-menu-btn {
            display: none;
            background: var(--sidebar-bg);
            border: none;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .mob-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
        }
        .mob-overlay.active { display: block; }

        /* ═══════════════════════════════
           PAGE HEADER
        ═══════════════════════════════ */
        .page-header {
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--green-900);
        }
        .breadcrumb {
            font-size: 12.5px;
            color: var(--text-light);
            margin-top: 3px;
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .breadcrumb a:hover { text-decoration: underline; }

        /* ═══════════════════════════════
           CARDS
        ═══════════════════════════════ */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px 24px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h3 { font-size: 16px; font-weight: 700; color: var(--green-900); }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
        }
        .stat-card .stat-icon {
            font-size: 26px;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* Course grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
        .course-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--green-300);
        }
        .course-card .card-img {
            height: 130px;
            background: linear-gradient(135deg, var(--green-800) 0%, var(--green-600) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: rgba(255,255,255,0.7);
        }
        .course-card .card-img img { width:100%; height:100%; object-fit:cover; }
        .course-card .card-body { padding: 15px 17px; }
        .course-card .card-body h4 { font-size: 15px; font-weight: 700; margin-bottom: 5px; color: var(--green-900); }
        .course-card .card-body p,
        .course-card .card-body .course-desc-preview {
            font-size: 13px;
            color: var(--text-light);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .course-card .card-footer {
            padding: 10px 17px;
            border-top: 1px solid var(--green-50);
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ═══════════════════════════════
           TABLA
        ═══════════════════════════════ */
        .table-wrap { overflow-x: auto; }
        table { width:100%; border-collapse:collapse; font-size:13.5px; }
        th, td { padding: 11px 14px; text-align:left; border-bottom: 1px solid #eef2ef; }
        th {

        ═══════════════════════════════════════════════════ */

            .btn { white-space: normal !important; text-align: center !important; }

            /* === MODAL === */

            /* === COURSE CARD DESC === */
            .course-desc-preview {

            /* === FILTROS DE RESULTADOS === */

        @media (max-width: 400px) {

    </style>
</head>

<script>
/* ════════════════════════════════════════
   CONFIGURACIÓN FIREBASE
   ──────────────────────────────────────
   NOTA DE SEGURIDAD: La apiKey de Firebase Web es PÚBLICA por diseño.
   No es una clave secreta: su propósito es identificar tu proyecto,
   NO autenticar servidores. La seguridad real la proveen:
     1. Las Reglas de Firestore (ver abajo)
     2. Firebase Authentication (usuarios autenticados)
     3. Restricciones de dominio en Firebase Console →
        Configuración del proyecto → Claves de API →
        Añadir tu dominio de GitHub Pages como referente autorizado.
   Asegúrate de AÑADIR TU DOMINIO en la restricción HTTP referrers
   de la API key en Google Cloud Console para evitar uso no autorizado.
════════════════════════════════════════ */

/* ════════════════════════════════════════
   REGLAS FIRESTORE NECESARIAS (Firebase Console → Firestore → Reglas):

   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       function isAuth() { return request.auth != null; }
       function isAdmin() { 
         return isAuth() && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin'; 
       }

       match /users/{userId} {
         allow create: if isAuth() && request.auth.uid == userId
                       && request.resource.data.role == 'student';
         allow read: if isAuth() && (request.auth.uid == userId || isAdmin());
         allow update: if isAuth() && (
           (request.auth.uid == userId && !request.resource.data.diff(resource.data).affectedKeys().hasAny(['role']))
           || isAdmin()
         );
         allow delete: if isAdmin();
       }
       match /courses/{id} { allow read: if isAuth(); allow create, update, delete: if isAdmin(); }
       match /lessons/{id} { allow read: if isAuth(); allow create, update, delete: if isAdmin(); }
       match /quizzes/{id} { allow read: if isAuth(); allow create, update, delete: if isAdmin(); }
       match /quizResults/{id} { 
         allow create: if isAuth() && request.resource.data.userId == request.auth.uid; 
         allow read: if isAuth() && (resource.data.userId == request.auth.uid || isAdmin());
         allow update: if false;
         allow delete: if isAdmin();
       }
       match /quizExtraAttempts/{id} {
         allow create: if isAdmin();
         allow read: if isAuth() && (resource.data.userId == request.auth.uid || isAdmin());
         allow update, delete: if isAdmin();
       }
     }
   }
════════════════════════════════════════ */

     const firebaseConfig = {
  apiKey: "AIzaSyDnzXP59rK49bmKbDeYX8oUtobVaKyI2A4",
  authDomain: "mi-lms-563bf.firebaseapp.com",
  projectId: "mi-lms-563bf",
  storageBucket: "mi-lms-563bf.firebasestorage.app",
  messagingSenderId: "303910884065",
  appId: "1:303910884065:web:5f2fe854e17fd25ed21da0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// Habilitar persistencia offline
db.enablePersistence({ synchronizeTabs: true })
    .catch(err => {
        /* No registrar en consola en producción para reducir info leakage */
        if (err.code !== 'failed-precondition' && err.code !== 'unimplemented') {
            console.warn('Persistencia offline no disponible.');
        }
    });

/* ════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════ */
let currentUser  = null;
let currentRole  = null;
let currentRoute = '';

/* ════════════════════════════════════════
   AUTH STATE OBSERVER
════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        try {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                currentRole = userDoc.data().role;
            } else {
                currentRole = 'student';
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    role: 'student',
                    enrolledCourses: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch(err) {
            console.error('Error al cargar usuario:', err);
            currentRole = 'student';
        }
        showDashboard();
    } else {
        currentUser = null;
        currentRole = null;
        showAuth();
    }
});

/* ════════════════════════════════════════
   FUNCIONES AUTH
════════════════════════════════════════ */
function showAuth() {
    document.getElementById('authSection').classList.remove('hidden');
    document.getElementById('dashboardSection').classList.add('hidden');
    showLogin();
}
function showLogin() {
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('alertAuth').style.display = 'none';
}
function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('alertAuth').style.display = 'none';
}
function showAlert(msg, type='error') {
    const el = document.getElementById('alertAuth');
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}
/* ════════════════════════════════════════
   RATE LIMITING EN CLIENTE (anti fuerza bruta)
   Complementa el bloqueo nativo de Firebase Auth
════════════════════════════════════════ */
const _loginAttempts = { count: 0, lastAttempt: 0, lockedUntil: 0 };
const LOGIN_MAX_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS   = 5 * 60 * 1000; // 5 minutos

function checkLoginRateLimit() {
    const now = Date.now();
    if (now < _loginAttempts.lockedUntil) {
        const secsLeft = Math.ceil((_loginAttempts.lockedUntil - now) / 1000);
        showAlert(`Demasiados intentos fallidos. Espera ${secsLeft} segundos.`);
        return false;
    }
    if (now - _loginAttempts.lastAttempt > LOGIN_LOCKOUT_MS) {
        _loginAttempts.count = 0;
    }
    return true;
}
function recordFailedLogin() {
    _loginAttempts.count++;
    _loginAttempts.lastAttempt = Date.now();
    if (_loginAttempts.count >= LOGIN_MAX_ATTEMPTS) {
        _loginAttempts.lockedUntil = Date.now() + LOGIN_LOCKOUT_MS;
    }
}

async function login() {
    if (!checkLoginRateLimit()) return;
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    if (!email || !pass) return showAlert('Completa todos los campos.');
    /* Validación básica de formato de email en cliente */
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showAlert('Correo electrónico inválido.');
    try {
        await auth.signInWithEmailAndPassword(email, pass);
        _loginAttempts.count = 0;
    } catch(err) {
        recordFailedLogin();
        showAlert('Error: ' + traducirError(err.code));
    }
}
async function register() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPassword').value;
    if (!name || !email || !pass) return showAlert('Completa todos los campos.');
    /* Validación de formato de email */
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showAlert('Correo electrónico inválido.');
    /* Política de contraseña más fuerte: mínimo 8 caracteres, al menos una letra y un número */
    if (pass.length < 8) return showAlert('La contraseña debe tener al menos 8 caracteres.');
    if (!/[a-zA-Z]/.test(pass) || !/[0-9]/.test(pass)) return showAlert('La contraseña debe incluir letras y números.');
    /* Sanitizar nombre: solo letras, espacios y caracteres básicos */
    if (name.length > 100) return showAlert('El nombre es demasiado largo.');
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('users').doc(cred.user.uid).set({
            uid: cred.user.uid, email, name,
            role: 'student', enrolledCourses: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await cred.user.updateProfile({ displayName: name });
    } catch(err) {
        showAlert('Error: ' + traducirError(err.code));
    }
}
async function logout() {
    await auth.signOut();
    currentUser = null; currentRole = null;
    closeModal();
    window.location.hash = '';
    /* Limpiar caché de navegación para que el botón "atrás" no exponga el dashboard */
    if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname);
    }
    showAuth();
}
function traducirError(code) {
    const m = {
        'auth/email-already-in-use': 'Este correo ya está registrado.',
        'auth/invalid-email':        'Correo inválido.',
        'auth/user-not-found':       'Usuario no encontrado.',
        'auth/wrong-password':       'Contraseña incorrecta.',
        'auth/invalid-credential':   'Credenciales inválidas.',
        'auth/weak-password':        'Contraseña muy débil (mínimo 6 caracteres).',
        'auth/too-many-requests':    'Demasiados intentos. Espera unos minutos.'
    };
    return m[code] || 'Error inesperado.';
}

async function resetPassword() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showAlert('Ingresa tu correo para recuperar la contraseña.');
    try {

        showAlert('📧 Se envió un correo de recuperación. Revisa tu bandeja.', 'success');
    } catch(err) {

}

window.addEventListener('hashchange', handleRoute);

function handleRoute() {
    // Extraer solo la ruta base del hash (ignorar ?params)
    const rawHash = window.location.hash.replace('#', '').split('?')[0];
    const hash = rawHash || (currentRole === 'admin' ? 'admin/courses' : 'student/courses');
    currentRoute = hash;
    updateActiveNav(hash);
    closeModal();
    closeSidebar();
    const main = document.getElementById('mainContent');

    // Verificar autenticación antes de renderizar
    if (!currentUser) {
        main.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><p>Sesión expirada. Por favor, inicia sesión nuevamente.</p></div>`;
        return;
    }

    /* SEGURIDAD: Re-verificar el rol desde Firestore antes de renderizar
       rutas de administración. Evita que un atacante modifique currentRole
       en memoria desde la consola del navegador para acceder a vistas admin. */
    if (hash.startsWith('admin/') && currentRole !== 'admin') {
        main.innerHTML = noAccess();
        return;
    }

    if (currentRole === 'admin') {
        if (hash === '' || hash === 'admin' || hash === 'welcome')                renderWelcomePage(main);
        else if (hash === 'admin/courses')                                        renderAdminCourses(main);
        else if (hash.match(/^admin\/courses\/([^/]+)$/))                         renderAdminCourseDetail(main, RegExp.$1);
        else if (hash.match(/^admin\/courses\/([^/]+)\/lessons\/([^/]+)$/))       renderAdminLessonEdit(main, RegExp.$1, RegExp.$2);
        else if (hash.match(/^admin\/courses\/([^/]+)\/quizzes$/))                renderAdminQuizzes(main, RegExp.$1);
        else if (hash === 'admin/students')                                       renderAdminStudents(main);
        else if (hash === 'admin/results')                                        renderAdminResults(main);
        else main.innerHTML = noAccess();
    } else if (currentRole === 'student') {
        if (hash === '' || hash === 'student' || hash === 'welcome')                              renderWelcomePage(main);
        else if (hash === 'student/courses')                                                      renderStudentCourses(main);
        else if (hash === 'student/results')                                                      renderStudentResults(main);
        else if (hash.match(/^student\/courses\/([^/]+)$/))                                       renderStudentCourseDetail(main, RegExp.$1);
        else if (hash.match(/^student\/courses\/([^/]+)\/lessons\/([^/]+)$/))                     renderStudentLesson(main, RegExp.$1, RegExp.$2);
        else if (hash.match(/^student\/courses\/([^/]+)\/quiz\/([^/]+)$/))                        renderStudentQuiz(main, RegExp.$1, RegExp.$2);
        else if (hash.match(/^student\/courses\/([^/]+)\/quiz\/([^/]+)\/result$/))                renderStudentQuizResult(main, RegExp.$1, RegExp.$2);
        else main.innerHTML = noAccess();
    } else {
        main.innerHTML = noAccess();
    }

    // Título topbar
    const titles = {
        '':               '🏠 Bienvenida',
        'welcome':        '🏠 Bienvenida',
        'admin':          '🏠 Panel de Administración',
        'student':        '🏠 Mi Panel',
        'admin/courses':  '📁 Gestión de Cursos',
        'admin/students': '👥 Alumnos',
        'admin/results':  '📊 Resultados de Exámenes',
        'student/courses':'📚 Mis Cursos',
        'student/results':'📊 Mis Resultados'
    };
    document.getElementById('topbarTitle').textContent = titles[hash] || 'INASEP LMS';
}

            <label>URL de imagen de portada (opcional)</label>

        </div>

            <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:14px;font-weight:600;">

            <button class="btn btn-primary" onclick="saveCourse('${isEdit ? courseData.id : ''}')">${isEdit ? 'Guardar Cambios' : 'Crear Curso'}</button>
        </div>`);

    // Inicializar Quill para descripción del curso
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            if (window._quillCourseDesc) {
                try { window._quillCourseDesc.off(); } catch(e) {}
                window._quillCourseDesc = null;
            }
            document.getElementById('quillCourseDesc').innerHTML = '';
            window._quillCourseDesc = new Quill('#quillCourseDesc', {
                theme: 'snow',
                placeholder: 'Escribe una descripción del curso...',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline'],
                        [{ list: 'ordered' }, { list: 'bullet' }],
                        ['link'],
                        ['clean']
                    ]
                }
            });
            if (initialDesc) {
                window._quillCourseDesc.root.innerHTML = initialDesc;
            }
        });
    });
}

async function saveCourse(id) {
    const title       = document.getElementById('courseTitle').value.trim();
    // Obtener descripción de TinyMCE
    let description = window._quillCourseDesc ? window._quillCourseDesc.root.innerHTML : '';
    const imageUrl    = document.getElementById('courseImage').value.trim();
    const active      = document.getElementById('courseActive').checked;

    const data = { title, description, imageUrl, active };
    const errors = validateCourse(data);
    if (errors.length > 0) return toast('⚠️ ' + errors.join('. '));

    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    const btn = document.querySelector('[onclick*="saveCourse"]');
    setLoading(btn, true);
    try {
        if (id) {
            await db.collection('courses').doc(id).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('courses').add(data);
        }
        if (window._quillCourseDesc) window._quillCourseDesc = null;
        closeModal();
        toast('✅ Curso guardado correctamente.', 'success');
        handleRoute();
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore en Firebase Console.');
        } else if (err.code === 'unauthenticated') {
            toast('❌ Debes iniciar sesión para guardar.');
        } else {
            toast('Error al guardar: ' + err.message);
        }
    } finally {
        setLoading(document.querySelector('[onclick*="saveCourse"]'), false);
    }
}

async function editCourse(id) {
    const d = await db.collection('courses').doc(id).get();
    if (d.exists) showCreateCourseModal({ id, ...d.data() });
}


/* ════════════════════════════════════════
   VALIDACIONES
════════════════════════════════════════ */
function validateCourse(data) {
    const errors = [];
    if (!data.title || data.title.trim().length < 3) errors.push('El título debe tener al menos 3 caracteres');
    if (data.title && data.title.length > 200) errors.push('El título es muy largo (máx 200 caracteres)');
    if (data.description && data.description.length > 50000) errors.push('La descripción es muy larga');
    if (data.imageUrl) {
        /* Solo permitir URLs https:// para imágenes — bloquea javascript: y data: */
        if (!data.imageUrl.match(/^https:\/\/.+/)) errors.push('La URL de imagen debe comenzar con https://');
    }
    return errors;
}

function validateLesson(data) {
    const errors = [];
    if (!data.title || data.title.trim().length < 2) errors.push('El título debe tener al menos 2 caracteres');
    if (data.title && data.title.length > 200) errors.push('El título es muy largo');
    if (data.order == null || isNaN(data.order) || data.order < 0) errors.push('El orden debe ser un número positivo');
    return errors;
}

function validateQuiz(data) {
    const errors = [];
    if (!data.title || data.title.trim().length < 3) errors.push('El título del examen es obligatorio (mín 3 caracteres)');
    if (!data.questions || data.questions.length === 0) errors.push('Debe incluir al menos una pregunta');
    data.questions.forEach((q, i) => {
        if (!q.question || q.question.trim().length < 5) errors.push(`Pregunta ${i+1}: debe tener al menos 5 caracteres`);
    });
    return errors;
}

function setLoading(btn, loading = true) {
    if (!btn) return;
    if (loading) {
        btn.dataset.originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '⏳ Guardando...';
    } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText || 'Guardar';
    }
}

async function deleteCourse(id) {
    const doc = await db.collection('courses').doc(id).get();
    const title = doc.exists ? '"' + doc.data().title + '"' : 'este curso';
    if (!confirm('¿Eliminar ' + title + ' y TODO su contenido (lecciones y exámenes)? Esta acción no se puede deshacer.')) return;
    const batch = db.batch();
    const lSnap = await db.collection('lessons').where('courseId', '==', id).get();
    lSnap.docs.forEach(d => batch.delete(d.ref));
    const qSnap = await db.collection('quizzes').where('courseId', '==', id).get();
    qSnap.docs.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection('courses').doc(id));
    await batch.commit();
    handleRoute();
}

async function saveLesson(lessonId, courseId) {
    const title   = document.getElementById('lessonTitle').value.trim();
    const order   = parseInt(document.getElementById('lessonOrder').value);
    // Obtener contenido de TinyMCE
    let content = getTinyMCEContent('lessonContent');

    const data = { title, order, content, courseId };
    const errors = validateLesson(data);
    if (errors.length > 0) return toast('⚠️ ' + errors.join('. '));

    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    const btn = document.querySelector('[onclick*="saveLesson("]');
    setLoading(btn, true);
    try {
        if (lessonId) {
            await db.collection('lessons').doc(lessonId).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('lessons').add(data);
        }
        // Destruir instancia de TinyMCE
        destroyTinyMCE('lessonContent');
        closeModal();
        toast('✅ Lección guardada correctamente.', 'success');
        navigate('admin/courses/' + courseId);
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore.');
        } else {
            toast('Error: ' + err.message);
        }
    } finally {
        setLoading(document.querySelector('[onclick*="saveLesson("]'), false);
    }
}

async function deleteLesson(lessonId, courseId) {

function showQuizModal(courseId, quizData = null) {
    const isEdit    = !!quizData;
    const questions = isEdit ? (quizData.questions || []) : [{ question: '', correctAnswer: true }];
    const qHtml     = questions.map((q, i) => quizQuestionHtml(q, i, questions.length)).join('');
    openModal(`
        <h3>${isEdit ? 'Editar Examen' : 'Nuevo Examen'}</h3>
        <div class="form-group">
            <label>Título del Examen *</label>
            <input type="text" id="quizTitle" value="${isEdit ? escHtml(quizData.title) : ''}" placeholder="Ej: Evaluación Módulo 1">
        </div>
        <div id="quizQuestionsContainer">${qHtml}</div>
        <button class="btn btn-sm btn-outline mb-2" style="margin-bottom:12px" onclick="addQuizQuestion()">+ Agregar Pregunta</button>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveQuiz('${isEdit ? quizData.id : ''}','${courseId}')">${isEdit ? 'Guardar' : 'Crear Examen'}</button>
        </div>`);
}

function quizQuestionHtml(q, i, total) {
    return `<div class="quiz-question" style="background:#f9fcfa;margin-bottom:8px;">
        <div class="flex justify-between items-center mb-1">
            <strong style="font-size:13px;">Pregunta ${i + 1}</strong>
            <button class="btn btn-sm btn-danger" onclick="removeQuizQuestion(this)" ${total <= 1 ? 'disabled' : ''}>✕</button>
        </div>
        <input type="text" class="quiz-q-text" value="${escHtml(q.question || '')}" placeholder="Escribe la pregunta..." style="margin-bottom:8px;width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:6px;font-family:inherit;">
        <div class="quiz-options">
            <label><input type="radio" name="q${i}" value="true"  ${q.correctAnswer === true  ? 'checked' : ''}> Verdadero</label>
            <label><input type="radio" name="q${i}" value="false" ${q.correctAnswer === false ? 'checked' : ''}> Falso</label>
        </div>
    </div>`;
}

function addQuizQuestion() {
    const container = document.getElementById('quizQuestionsContainer');
    const idx       = container.querySelectorAll('.quiz-question').length;
    const div       = document.createElement('div');
    div.innerHTML   = quizQuestionHtml({ question: '', correctAnswer: true }, idx, idx + 1);
    container.appendChild(div.firstElementChild);
    // Actualizar botones de eliminar (habilitar si hay más de 1)
    const allBtns = container.querySelectorAll('.quiz-question .btn-danger');
    allBtns.forEach(b => b.disabled = false);
}

function removeQuizQuestion(btn) {
    const c = document.getElementById('quizQuestionsContainer');
    if (c.querySelectorAll('.quiz-question').length <= 1) return;
    btn.closest('.quiz-question').remove();
}

async function saveQuiz(quizId, courseId) {
    const titleEl = document.getElementById('quizTitle');
    if (!titleEl) return toast('⚠️ No se encontró el formulario.');
    const title = titleEl.value.trim();

    const container = document.getElementById('quizQuestionsContainer');
    const questionDivs = container ? container.querySelectorAll('.quiz-question') : [];
    const questions = [];
    questionDivs.forEach((div, idx) => {
        const text  = div.querySelector('.quiz-q-text')?.value.trim();
        if (!text) return;
        const checkedRadio = div.querySelector('input[type="radio"]:checked');
        const correctAnswer = checkedRadio ? (checkedRadio.value === 'true') : true;
        questions.push({ question: text, correctAnswer });
    });

    const data = { title, questions, courseId };
    const errors = validateQuiz(data);
    if (errors.length > 0) return toast('⚠️ ' + errors.join('. '));

    const saveBtn = document.querySelector('[onclick*="saveQuiz"]');
    setLoading(saveBtn, true);
    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
        if (quizId) {
            await db.collection('quizzes').doc(quizId).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('quizzes').add(data);
        }
        closeModal();
        toast('✅ Examen guardado correctamente.', 'success');
        navigate('admin/courses/' + courseId + '/quizzes');
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore en Firebase Console.');
        } else {
            toast('Error al guardar examen: ' + err.message);
        }
    } finally {
        setLoading(document.querySelector('[onclick*="saveQuiz"]'), false);
    }
}

async function editQuiz(qId, cId) {
    const d = await db.collection('quizzes').doc(qId).get();
    if (d.exists) showQuizModal(cId, { id: qId, ...d.data() });
}

async function deleteQuiz(qId, cId) {
    if (!confirm('¿Eliminar este examen y sus resultados?')) return;
    const batch  = db.batch();
    const rSnap  = await db.collection('quizResults').where('quizId', '==', qId).get();
    rSnap.docs.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection('quizzes').doc(qId));
    await batch.commit();
    handleRoute();
}

async function showAssignExtraAttemptModal() {

        db.collection('users').where('role', '==', 'student').get(),

        db.collection('courses').get()
    ]);

    const usersMap = {};
    usersSnap.docs.forEach(d => {
        const u = d.data();
        usersMap[d.id] = { name: u.name || 'Sin nombre', email: u.email };
    });

    const quizzesMap = {};
    quizzesSnap.docs.forEach(d => {
        const q = d.data();
        quizzesMap[d.id] = { title: q.title, courseId: q.courseId };
    });

    const coursesMap = {};
    coursesSnap.docs.forEach(d => coursesMap[d.id] = d.data().title);

    const userOpts = Object.entries(usersMap).map(([id, u]) => 
        `<option value="${id}">${escHtml(u.name)} (${escHtml(u.email)})</option>`
    ).join('');

    const quizOpts = Object.entries(quizzesMap).map(([id, q]) => 
        `<option value="${id}" data-course="${q.courseId}">${escHtml(coursesMap[q.courseId] || 'Curso')} — ${escHtml(q.title)}</option>`
    ).join('');

    openModal(`
        <h3>➕ Asignar Intento Extra</h3>
        <p style="font-size:13px;color:var(--text-mid);margin-bottom:16px;">
            Los alumnos tienen <strong>2 intentos automáticos</strong>. Aquí puedes asignar intentos adicionales a quienes los necesiten.
        </p>
        <div class="form-group">
            <label>Alumno *</label>
            <select id="extraStudent" style="width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-family:inherit;">
                <option value="">Seleccionar alumno...</option>
                ${userOpts}
            </select>
        </div>
        <div class="form-group">
            <label>Examen *</label>
            <select id="extraQuiz" style="width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-family:inherit;">
                <option value="">Seleccionar examen...</option>
                ${quizOpts}
            </select>
        </div>
        <div class="form-group">
            <label>Motivo (opcional)</label>
            <input type="text" id="extraReason" placeholder="Ej: Solicitud por correo, error técnico, etc." style="width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-family:inherit;">
        </div>
        <div id="extraAttemptPreview" style="background:var(--green-50);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--text-mid);display:none;">
            <strong>Resumen del alumno:</strong>
            <div id="extraAttemptInfo"></div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveExtraAttempt()">✅ Asignar Intento Extra</button>
        </div>
    `);

    // Agregar listener para mostrar preview cuando se selecciona alumno y quiz
    setTimeout(() => {
        const studentSelect = document.getElementById('extraStudent');
        const quizSelect = document.getElementById('extraQuiz');
        if (studentSelect) studentSelect.addEventListener('change', updateExtraAttemptPreview);
        if (quizSelect) quizSelect.addEventListener('change', updateExtraAttemptPreview);
    }, 100);
}

async function updateExtraAttemptPreview() {
    const studentId = document.getElementById('extraStudent')?.value;
    const quizId = document.getElementById('extraQuiz')?.value;
    const preview = document.getElementById('extraAttemptPreview');
    const info = document.getElementById('extraAttemptInfo');

    if (!studentId || !quizId || !preview || !info) return;

    try {
        const [resultsSnap, extraSnap] = await Promise.all([
            db.collection('quizResults').where('userId', '==', studentId).where('quizId', '==', quizId).get(),
            db.collection('quizExtraAttempts').where('userId', '==', studentId).where('quizId', '==', quizId).get()
        ]);

        const attempts = resultsSnap.size;
        const extras = extraSnap.size;
        const totalAllowed = 2 + extras;
        const remaining = totalAllowed - attempts;
        const best = resultsSnap.docs.length > 0 
            ? Math.max(...resultsSnap.docs.map(d => d.data().percentage)) 
            : null;

        info.innerHTML = `
            <div style="margin-top:6px;">
                • Intentos realizados: <strong>${attempts}</strong><br>
                • Intentos extra asignados: <strong>${extras}</strong><br>
                • Total permitido: <strong>${totalAllowed}</strong><br>
                • Intentos restantes: <strong style="color:${remaining > 0 ? '#27ae60' : '#e74c3c'}">${remaining}</strong><br>
                • Mejor puntaje: <strong>${best !== null ? best + '%' : 'Sin rendir'}</strong>
            </div>
        `;
        preview.style.display = 'block';
    } catch(e) {
        info.innerHTML = 'Error cargando información.';
        preview.style.display = 'block';
    }
}

async function saveExtraAttempt() {
    const studentId = document.getElementById('extraStudent')?.value;
    const quizId = document.getElementById('extraQuiz')?.value;
    const reason = document.getElementById('extraReason')?.value?.trim() || '';

    if (!studentId || !quizId) return toast('⚠️ Selecciona alumno y examen.');

    const btn = document.querySelector('[onclick*="saveExtraAttempt"]');
    setLoading(btn, true);

    try {
        await db.collection('quizExtraAttempts').add({
            userId: studentId,
            quizId: quizId,
            assignedBy: currentUser.uid,
            assignedByName: currentUser.displayName || currentUser.email,
            reason: reason,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        closeModal();
        toast('✅ Intento extra asignado correctamente.', 'success');
        handleRoute(); // Recargar panel
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore.');
        } else {
            toast('Error: ' + err.message);
        }
        setLoading(btn, false);
    }
}

        const coursesMap = {};
        coursesSnap.docs.forEach(d => coursesMap[d.id] = d.data().title);

        const quizzesMap = {};
        quizzesSnap.docs.forEach(d => {
            const q = d.data();
            quizzesMap[d.id] = { title: q.title, courseId: q.courseId };
        });

        // Ordenar resultados por fecha (más reciente primero)
        const sortedResults = resultsSnap.docs.sort((a, b) => {
            const aTime = a.data().createdAt?.toMillis?.() || 0;
            const bTime = b.data().createdAt?.toMillis?.() || 0;
            return bTime - aTime;
        });

        // Estadísticas generales
        const totalExams = sortedResults.length;
        const approvedCount = sortedResults.filter(d => d.data().percentage >= 60).length;
        const avgScore = Math.round(sortedResults.reduce((sum, d) => sum + d.data().percentage, 0) / totalExams);

        // Estadísticas por alumno
        const studentStats = {};
        sortedResults.forEach(d => {
            const r = d.data();
            const uid = r.userId;
            if (!studentStats[uid]) {
                studentStats[uid] = { name: usersMap[uid]?.name || 'Desconocido', attempts: 0, best: 0, approved: 0, total: 0 };
            }
            studentStats[uid].attempts++;
            studentStats[uid].total += r.percentage;
            if (r.percentage > studentStats[uid].best) studentStats[uid].best = r.percentage;
            if (r.percentage >= 60) studentStats[uid].approved++;
        });

        statsDiv.innerHTML = `
            <div class="stats-grid" style="margin-bottom:24px">
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value">${totalExams}</div>
                    <div class="stat-label">Total Exámenes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">${approvedCount}</div>
                    <div class="stat-label">Aprobaciones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value">${avgScore}%</div>
                    <div class="stat-label">Promedio General</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value">${Object.keys(studentStats).length}</div>
                    <div class="stat-label">Alumnos Evaluados</div>
                </div>
            </div>`;

        // Tabla detallada con filtros
        let tableHtml = `
            <div class="card">
                <div class="card-header" style="flex-direction:column;align-items:flex-start;gap:10px;">
                    <h3>📋 Detalle por Alumno</h3>
                    <div class="flex gap-2" style="width:100%">
                        <input type="text" id="searchStudent" placeholder="🔍 Buscar alumno..." 
                            style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;"
                            onkeyup="filterResultsTable()">
                        <select id="filterCourse" onchange="filterResultsTable()" 
                            style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;min-width:180px;">
                            <option value="">Todos los cursos</option>
                            ${Object.entries(coursesMap).map(([id, title]) => `<option value="${escHtml(title)}">${escHtml(title)}</option>`).join('')}
                        </select>
                        <select id="filterStatus" onchange="filterResultsTable()"
                            style="padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;">
                            <option value="">Todos</option>
                            <option value="approved">Aprobados</option>
                            <option value="failed">No aprobados</option>
                        </select>
                    </div>
                </div>
                <div class="table-wrap">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>Alumno</th>
                                <th>Correo</th>
                                <th>Curso</th>
                                <th>Examen</th>
                                <th>Intento</th>
                                <th>Score</th>
                                <th>%</th>
                                <th>Estado</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>`;

        // Contar intentos por quiz para cada usuario
        const attemptCounter = {};

        sortedResults.forEach(d => {
            const r = d.data();
            const user = usersMap[r.userId] || { name: 'Desconocido', email: '—' };
            const quiz = quizzesMap[r.quizId] || {};
            const courseName = coursesMap[quiz.courseId] || coursesMap[r.courseId] || 'Curso';
            const quizName = quiz.title || 'Examen';
            const isApproved = r.percentage >= 60;
            const date = r.createdAt?.toDate?.() ? r.createdAt.toDate().toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';

            // Contar intento
            const key = r.userId + '_' + r.quizId;
            if (!attemptCounter[key]) attemptCounter[key] = 0;
            attemptCounter[key]++;
            const attemptNum = attemptCounter[key];

            tableHtml += `<tr data-student="${escHtml(user.name.toLowerCase())}" data-course="${escHtml(courseName)}" data-status="${isApproved ? 'approved' : 'failed'}" data-result-id="${d.id}">
                <td><strong>${escHtml(user.name)}</strong></td>
                <td style="font-size:12px">${escHtml(user.email)}</td>
                <td>${escHtml(courseName)}</td>
                <td>${escHtml(quizName)}</td>
                <td>#${attemptNum}</td>
                <td>${r.score}/${r.total}</td>
                <td><strong style="color:${isApproved ? '#27ae60' : '#e74c3c'}">${r.percentage}%</strong></td>
                <td><span class="badge ${isApproved ? 'badge-green' : 'badge-orange'}">${isApproved ? '✅ Aprobado' : '❌ No aprobado'}</span></td>
                <td style="font-size:12px;color:var(--text-light);white-space:nowrap">${date}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteResult('${d.id}', this)" title="Eliminar este resultado">🗑️</button>
                </td>
            </tr>`;
        });

        tableHtml += `</tbody></table></div></div>`;
        list.innerHTML = tableHtml;

    } catch(err) {
        list.innerHTML = `<div class="empty-state card"><div class="icon">⚠️</div><p>Error cargando resultados: ${escHtml(err.message)}</p></div>`;
        statsDiv.innerHTML = '';
    }

// Filtros para tabla de resultados
function filterResultsTable() {
    const search = document.getElementById('searchStudent')?.value.toLowerCase() || '';
    const course = document.getElementById('filterCourse')?.value || '';
    const status = document.getElementById('filterStatus')?.value || '';

    document.querySelectorAll('#resultsTable tbody tr').forEach(row => {
        const studentMatch = row.dataset.student?.includes(search);
        const courseMatch = !course || row.dataset.course === course;
        const statusMatch = !status || row.dataset.status === status;
        row.style.display = (studentMatch && courseMatch && statusMatch) ? '' : 'none';
    });
}

// Exportar resultados a CSV
async function quickAssignExtra(studentId, quizId) {
    if (!confirm('¿Asignar un intento extra a este alumno para este examen?')) return;

    try {
        await db.collection('quizExtraAttempts').add({
            userId: studentId,
            quizId: quizId,
            assignedBy: currentUser.uid,
            assignedByName: currentUser.displayName || currentUser.email,
            reason: 'Asignado rápido desde panel de resultados',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('✅ Intento extra asignado.', 'success');
        handleRoute(); // Recargar
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore.');
        } else {
            toast('Error: ' + err.message);
        }
    }
}

function exportResultsCSV() {
    const rows = document.querySelectorAll('#resultsTable tbody tr');
    if (rows.length === 0) return toast('No hay datos para exportar.');

    let csv = 'Alumno,Correo,Curso,Examen,Intento,Score,Porcentaje,Estado,Fecha\n';
    rows.forEach(row => {
        if (row.style.display === 'none') return;
        const cells = row.querySelectorAll('td');
        // Excluir última celda (botón de acción)
        const values = Array.from(cells).slice(0, -1).map(c => '"' + c.textContent.replace(/"/g, '""').trim() + '"');
        csv += values.join(',') + '\n';
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'resultados_inasep_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
    toast('✅ CSV descargado', 'success');
}

async function deleteResult(resultId, btn) {
    if (!confirm('¿Eliminar este resultado de examen? Esta acción no se puede deshacer.')) return;
    if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
    try {
        await db.collection('quizResults').doc(resultId).delete();
        // Eliminar la fila de la tabla sin recargar toda la página
        const row = document.querySelector(`tr[data-result-id="${resultId}"]`);
        if (row) row.remove();
        toast('✅ Resultado eliminado.', 'success');
        // Si la tabla quedó vacía, recargar la vista
        const remaining = document.querySelectorAll('#resultsTable tbody tr');
        if (remaining.length === 0) handleRoute();
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica las reglas de Firestore.');
        } else {
            toast('Error al eliminar: ' + err.message);
        }
        if (btn) { btn.disabled = false; btn.textContent = '🗑️'; }
    }
}

async function showEnrollModal(studentId = null) {
    const coursesSnap = await db.collection('courses').get();
    const opts = coursesSnap.docs.map(d => `<option value="${d.id}">${escHtml(d.data().title)}</option>`).join('');
    let extra = '';
    if (studentId) {
        const d = await db.collection('users').doc(studentId).get();
        if (d.exists) {
            const enrolled = d.data().enrolledCourses || [];
            const courseNames = await Promise.all(enrolled.map(async cid => {
                const cd = await db.collection('courses').doc(cid).get();
                return cd.exists ? cd.data().title : cid;
            }));
            extra = `<div class="card" style="background:var(--green-50);margin-bottom:14px;">
                <p style="font-size:13px;color:var(--text-mid);"><strong>Cursos actuales:</strong> ${courseNames.join(', ') || 'Ninguno'}</p>
            </div>
            <div class="flex gap-2 mb-2">
                <button class="btn btn-success btn-sm" onclick="assignCourse('${studentId}')">✅ Asignar</button>
                <button class="btn btn-warning btn-sm" onclick="unassignCourse('${studentId}')">❌ Desasignar</button>
            </div>`;
        }
    } else {
        extra = `<div class="form-group">
            <label>Correo del alumno</label>
            <input type="email" id="enrollEmail" placeholder="correo@ejemplo.com">
        </div>
        <button class="btn btn-primary" onclick="assignCourseByEmail()">Asignar</button>`;
    }
    openModal(`
        <h3>${studentId ? 'Gestionar Cursos del Alumno' : 'Asignar Curso'}</h3>
        ${!studentId ? extra : ''}
        <div class="form-group">
            <label>Curso</label>
            <select id="enrollCourse">${opts}</select>
        </div>
        ${studentId ? extra : ''}
        <div class="modal-actions mt-2">
            <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
        </div>`);
}

async function assignCourseByEmail() {
    const email    = document.getElementById('enrollEmail').value.trim().toLowerCase();
    const courseId = document.getElementById('enrollCourse').value;
    if (!email || !courseId) return toast('⚠️ Completa todos los campos.');
    const snap = await db.collection('users').where('email', '==', email).where('role', '==', 'student').get();
    if (snap.empty) return toast('⚠️ Alumno no encontrado.');
    const doc = snap.docs[0];
    if ((doc.data().enrolledCourses || []).includes(courseId)) return toast('El alumno ya está inscrito en ese curso.');
    await db.collection('users').doc(doc.id).update({
        enrolledCourses: firebase.firestore.FieldValue.arrayUnion(courseId)
    });
    closeModal();
    handleRoute();
    toast('✅ Curso asignado correctamente.', 'success');
}

async function assignCourse(sid) {
    const cid = document.getElementById('enrollCourse').value;
    const d   = await db.collection('users').doc(sid).get();
    if ((d.data().enrolledCourses || []).includes(cid)) return toast('El alumno ya está inscrito.');
    await db.collection('users').doc(sid).update({
        enrolledCourses: firebase.firestore.FieldValue.arrayUnion(cid)
    });
    closeModal();
    handleRoute();
    toast('✅ Asignado.', 'success');
}

async function unassignCourse(sid) {
    const cid = document.getElementById('enrollCourse').value;
    await db.collection('users').doc(sid).update({
        enrolledCourses: firebase.firestore.FieldValue.arrayRemove(cid)
    });
    closeModal();
    handleRoute();
    toast('Desasignado.', 'success');
}

async function removeStudent(sid) {
    if (!confirm('¿Eliminar este alumno y TODO su historial de exámenes? Esta acción no se puede deshacer.')) return;

    const btn = event.target;
    setLoading(btn, true);

    try {
        // 1. Eliminar todos los resultados de exámenes del alumno
        const resultsSnap = await db.collection('quizResults').where('userId', '==', sid).get();
        const batch = db.batch();
        let deletedResults = 0;
        resultsSnap.docs.forEach(d => {
            batch.delete(d.ref);
            deletedResults++;
        });

        // 2. Eliminar intentos extra asignados al alumno
        const extraSnap = await db.collection('quizExtraAttempts').where('userId', '==', sid).get();
        let deletedExtras = 0;
        extraSnap.docs.forEach(d => {
            batch.delete(d.ref);
            deletedExtras++;
        });

        // 3. Ejecutar batch de eliminación de resultados
        if (deletedResults > 0 || deletedExtras > 0) {
            await batch.commit();
        }

        // 4. Eliminar el usuario
        await db.collection('users').doc(sid).delete();

        toast(`✅ Alumno eliminado. Se borraron ${deletedResults} resultados y ${deletedExtras} intentos extra.`, 'success');
        handleRoute();
    } catch(err) {
        if (err.code === 'permission-denied') {
            toast('❌ Sin permisos. Verifica que las reglas de Firestore permitan eliminar quizResults y quizExtraAttempts.');
        } else {
            toast('Error al eliminar: ' + err.message);
        }
        setLoading(btn, false);
    }
}
