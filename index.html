async function renderStudentCourses(container) {
    container.innerHTML = `
        <div class="page-header"><h2>📚 Mis Cursos</h2></div>
        <div id="studentCoursesList" class="grid"></div>`;

    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (!userDoc.exists) return;
    const enrolled = userDoc.data().enrolledCourses || [];
    const list     = document.getElementById('studentCoursesList');

    if (enrolled.length === 0) {
        list.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="icon">🎓</div>
            <p>Aún no estás inscrito en ningún curso.<br>Contacta a tu administrador.</p>
        </div>`;
        return;
    }
    // Firestore 'in' limita a 10 elementos y requiere índice. 
    // Fallback: obtener todos los cursos activos y filtrar en cliente
    let snap;
    try {
        if (enrolled.length <= 10) {
            snap = await db.collection('courses')
                .where(firebase.firestore.FieldPath.documentId(), 'in', enrolled).get();
        } else {
            throw new Error('too_many_ids');
        }
    } catch(err) {
        // Fallback: obtener todos y filtrar en cliente
        const allSnap = await db.collection('courses').get();
        const filtered = allSnap.docs.filter(d => enrolled.includes(d.id));
        snap = { docs: filtered, empty: filtered.length === 0, size: filtered.length };
    }
    list.innerHTML = snap.docs.map(d => {
        const c = d.data();
        return `<div class="course-card" onclick="navigate('student/courses/${d.id}')">
            <div class="card-img">${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.title}">` : '📖'}</div>
            <div class="card-body">
                <h4>${escHtml(c.title)}</h4>
                <p class="course-desc-preview">${c.description ? c.description.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() : ''}</p>
            </div>
            <div class="card-footer">
                <span class="badge badge-green">Inscrito</span>
                <span class="btn btn-sm btn-outline" style="margin-left:auto">Ver →</span>
            </div>
        </div>`;
    }).join('');
}

async function renderStudentCourseDetail(container, courseId) {
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (!(userDoc.data().enrolledCourses || []).includes(courseId)) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><p>No estás inscrito en este curso.</p></div>`;
        return;
    }
    const cDoc  = await db.collection('courses').doc(courseId).get();
    if (!cDoc.exists) return;
    const c     = cDoc.data();
    let lSnap, qSnap, resultsSnap;
    try {
        const [lRes, qRes, rRes] = await Promise.all([
            db.collection('lessons').where('courseId', '==', courseId).get(),
            db.collection('quizzes').where('courseId', '==', courseId).get(),
            db.collection('quizResults').where('userId', '==', currentUser.uid).get()
        ]);
        lSnap = lRes;
        qSnap = qRes;
        resultsSnap = rRes;
    } catch(err) {
        container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error cargando contenido: ${escHtml(err.message)}</p></div>`;
        return;
    }
    // Ordenar lecciones en cliente
    const sortedStudentLessons = lSnap.docs.sort((a, b) => (a.data().order || 0) - (b.data().order || 0));

    // Obtener mejores resultados por quiz
    const bestResults = {};
    resultsSnap.docs.forEach(d => {
        const r = d.data();
        if (r.courseId === courseId) {
            if (!bestResults[r.quizId] || r.percentage > bestResults[r.quizId].percentage) {
                bestResults[r.quizId] = r;
            }
        }
    });

    container.innerHTML = `
        <div class="page-header">
            <div>
                <h2>📖 ${escHtml(c.title)}</h2>
                <p class="breadcrumb"><a href="#student/courses">Mis Cursos</a> / ${escHtml(c.title)}</p>
            </div>
        </div>
        ${c.description ? `<div class="card course-description-card" style="background:var(--green-50);border-color:var(--green-200)"><div class="lesson-content" id="courseDescContent"></div></div>` : ''}
        <div id="studentLessonsList"></div>
        <div id="studentQuizzesList"></div>`;

    const lList = document.getElementById('studentLessonsList');
    // Renderizar descripción del curso de forma segura (HTML de Quill)
    const descEl = document.getElementById('courseDescContent');
    if (descEl && c.description) {
        safeSetInnerHTML(descEl, c.description);
    }
    if (lSnap.empty) {
        lList.innerHTML = `<div class="empty-state card"><p>Este curso aún no tiene lecciones.</p></div>`;
    } else {
        lList.innerHTML = `<div class="card">
            <div class="card-header"><h3>📄 Lecciones</h3></div>
            ${sortedStudentLessons.map((d, i) => {
                const l = d.data();
                return `<div class="flex items-center gap-2" style="padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;"
                    onclick="navigate('student/courses/${courseId}/lessons/${d.id}')">
                    <span class="badge badge-blue">${l.order ?? i + 1}</span>
                    <strong style="flex:1">${escHtml(l.title)}</strong>
                    <span style="color:var(--primary);font-weight:600;font-size:13px;">Ver →</span>
                </div>`;
            }).join('')}
        </div>`;
    }

    const qList = document.getElementById('studentQuizzesList');
    if (!qSnap.empty) {
        // Obtener intentos extra para este curso
        let extraAttemptsMap = {};
        try {
            const extraSnap = await db.collection('quizExtraAttempts')
                .where('userId', '==', currentUser.uid).get();
            extraSnap.docs.forEach(d => {
                const e = d.data();
                if (!extraAttemptsMap[e.quizId]) extraAttemptsMap[e.quizId] = 0;
                extraAttemptsMap[e.quizId]++;
            });
        } catch(e) {}

        qList.innerHTML = `<div class="card">
            <div class="card-header"><h3>📝 Exámenes</h3></div>
            ${await Promise.all(qSnap.docs.map(async d => {
                const q = d.data();
                const best = bestResults[d.id];
                const isApproved = best && best.percentage >= 60;
                const attempts = resultsSnap.docs.filter(r => r.data().quizId === d.id).length;
                const extra = extraAttemptsMap[d.id] || 0;
                const totalAllowed = 2 + extra;
                const remaining = totalAllowed - attempts;
                const canTake = !isApproved && remaining > 0;

                return `<div class="flex justify-between items-center" style="padding:14px 0;border-bottom:1px solid var(--border);">
                    <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                            <strong>${escHtml(q.title)}</strong>
                            <span class="badge badge-orange">${q.questions?.length || 0} preguntas</span>
                        </div>
                        ${best ? `
                            <div style="font-size:13px;color:var(--text-mid)">
                                <span style="color:${isApproved ? '#27ae60' : '#e74c3c'};font-weight:600;">
                                    ${isApproved ? '✅ Aprobado' : '❌ No aprobado'} — ${best.percentage}%
                                </span>
                                <span style="color:var(--text-light);margin-left:8px;">(${attempts}/${totalAllowed} intento${totalAllowed > 1 ? 's' : ''}${extra > 0 ? ', ' + extra + ' extra' : ''})</span>
                            </div>
                        ` : `<div style="font-size:13px;color:var(--text-light)">${remaining > 0 ? remaining + ' intento' + (remaining > 1 ? 's' : '') + ' disponible' + (remaining > 1 ? 's' : '') : 'Sin intentos'}</div>`}
                    </div>
                    <div style="margin-left:12px;text-align:right;min-width:120px">
                        ${isApproved 
                            ? `<span class="badge badge-green" style="font-size:12px">Completado</span>` 
                            : canTake
                                ? `<button class="btn btn-sm ${best ? 'btn-warning' : 'btn-primary'}" onclick="navigate('student/courses/${courseId}/quiz/${d.id}')">${best ? '🔄 Reintentar' : '▶ Iniciar'}</button>`
                                : `<span class="badge badge-gray" style="font-size:11px">🚫 Sin intentos</span>`
                        }
                    </div>
                </div>`;
            }))}
        </div>`;
    }
}

async function renderStudentLesson(container, courseId, lessonId) {
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (!(userDoc.data().enrolledCourses || []).includes(courseId)) return;

        db.collection('lessons').doc(lessonId).get(),
        db.collection('courses').doc(courseId).get()
    ]);
    if (!lDoc.exists) return;
    const l = lDoc.data();
    const cTitle = cDoc.exists ? cDoc.data().title : 'Curso';

    // Obtener todas las lecciones del curso para navegación
    let prevLesson = null;
    let nextLesson = null;
    try {
        const allLessonsSnap = await db.collection('lessons').where('courseId', '==', courseId).get();

            .map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => (a.order || 0) - (b.order || 0));

    container.innerHTML = `
        <div class="page-header">
            <div>
                <h2>📄 ${escHtml(l.title)}</h2>
                <p class="breadcrumb">
                    <a href="#student/courses">Mis Cursos</a> /

                    ${escHtml(l.title)}
                </p>
            </div>
        </div>
        <div class="card lesson-card">
            <div class="lesson-content" id="lessonContentArea"></div>
        </div>

        <!-- Botones de navegación entre lecciones -->
        <div class="lesson-nav">
            ${prevLesson 
                ? `<button class="btn btn-outline lesson-nav-btn" onclick="navigateAndScroll('student/courses/${courseId}/lessons/${prevLesson.id}')">
                    <span style="font-size:18px;">←</span>
                    <div class="lesson-nav-label">

                        <span class="lesson-nav-title">${escHtml(prevLesson.title)}</span>
                    </div>
                </button>`
                : `<div></div>`
            }
            <button class="btn btn-secondary lesson-nav-center" onclick="navigate('student/courses/${courseId}')">
                📋 Índice del Curso
            </button>
            ${nextLesson 
                ? `<button class="btn btn-primary lesson-nav-btn" onclick="navigateAndScroll('student/courses/${courseId}/lessons/${nextLesson.id}')">
                    <div class="lesson-nav-label" style="text-align:right;">
                        <span class="lesson-nav-small">Siguiente</span>
                        <span class="lesson-nav-title">${escHtml(nextLesson.title)}</span>
                    </div>
                    <span style="font-size:18px;">→</span>
                </button>`
                : `<div></div>`
            }
        </div>`;

    // Inyectar contenido de la lección de forma segura (limpia width/height fijos)
    const lessonEl = document.getElementById('lessonContentArea');
    if (lessonEl) {
        if (l.content) {
            safeSetInnerHTML(lessonEl, l.content);
        } else {
            lessonEl.innerHTML = '<p>Esta lección no tiene contenido aún.</p>';
        }
    }

    // Scroll al inicio del contenido después de renderizar
    scrollToContentTop();
}

async function submitQuiz(quizId, courseId) {
    // — Estado de carga —
    const submitBtn = document.getElementById('submitBtn');
    const submitArea = document.getElementById('submitArea');
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:10px;"><span style="width:18px;height:18px;border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></span> Enviando respuestas...</span>';
    }
    // Bloquear radios
    document.querySelectorAll('.quiz-question input[type=radio]').forEach(r => r.disabled = true);

    const qDoc = await db.collection('quizzes').doc(quizId).get();
    if (!qDoc.exists) return;
    const quiz      = qDoc.data();
    const questions = quiz.questions || [];

    // Verificar intentos previos del usuario
    let attempts = 0;
    let extraAttempts = 0;
    try {
        const prevResults = await db.collection('quizResults')
            .where('userId', '==', currentUser.uid)
            .where('quizId', '==', quizId).get();
        attempts = prevResults.size;

        const extraSnap = await db.collection('quizExtraAttempts')
            .where('userId', '==', currentUser.uid)
            .where('quizId', '==', quizId).get();
        extraAttempts = extraSnap.size;
    } catch(e) {
        console.error('Error verificando intentos:', e);
    }

    const totalAllowed = 2 + extraAttempts;
    if (attempts >= totalAllowed) {
        toast('❌ Has agotado tus ' + totalAllowed + ' intentos. Contacta al administrador para solicitar uno adicional.', 'error');
        setTimeout(() => navigate('student/courses/' + courseId), 2000);
        return;
    }

    let correctas   = 0;
    const respuestas = [];
    for (let i = 0; i < questions.length; i++) {
        const rTrue  = document.querySelector(`input[name="q${i}"][value="true"]`);
        const rFalse = document.querySelector(`input[name="q${i}"][value="false"]`);
        let uAns = null;
        if (rTrue?.checked)  uAns = true;
        if (rFalse?.checked) uAns = false;
        respuestas.push({ question: questions[i].question, userAnswer: uAns, correctAnswer: questions[i].correctAnswer });
        if (uAns === questions[i].correctAnswer) correctas++;
    }
    const total      = questions.length;
    const porcentaje = Math.round((correctas / total) * 100);

    let resultRef;
    try {
        resultRef = await db.collection('quizResults').add({
            userId: currentUser.uid, quizId, courseId,
            score: correctas, total, percentage: porcentaje,
            respuestas,
            attemptNumber: attempts + 1,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(err) {
        // Restaurar botón en caso de error
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✅ Enviar Respuestas';
        }
        document.querySelectorAll('.quiz-question input[type=radio]').forEach(r => r.disabled = false);
        if (err.code === 'permission-denied') {
            toast('❌ No se pudo guardar el resultado. Verifica los permisos de Firestore.');
        } else if (err.code === 'unauthenticated') {
            toast('❌ Sesión expirada. Vuelve a iniciar sesión.');
        } else {
            toast('Error al enviar respuestas: ' + err.message);
        }
        return;
    }

    // — Actualizar hash sin navegar (para que el botón atrás funcione) —
    history.replaceState(null, '', '#student/courses/' + courseId + '/quiz/' + quizId + '/result?id=' + resultRef.id);

    // — Renderizar resultado inline debajo del examen —
    const rData = { userId: currentUser.uid, quizId, courseId, score: correctas, total, percentage: porcentaje, respuestas, attemptNumber: attempts + 1 };
    const ap = porcentaje >= 60;
    const newAttempts = attempts + 1;
    const canRetry = !ap && newAttempts < totalAllowed;

    // Reemplazar el botón por un mensaje de éxito
    if (submitArea) {
        submitArea.innerHTML = `<p style="color:var(--success);font-weight:600;font-size:14px;margin-top:8px;">✅ Respuestas enviadas correctamente</p>`;
    }

    const resultArea = document.getElementById('quizResultArea');
    if (!resultArea) return;

    resultArea.innerHTML = `
        <div class="result-box ${ap ? '' : 'fail'}" style="margin-top:24px;">
            <div style="font-size:50px;">${ap ? '🎉' : '😞'}</div>
            <div class="result-score" style="color:${ap ? '#27ae60' : '#e74c3c'}">${porcentaje}%</div>
            <p style="font-size:15px;margin-top:6px">${correctas} de ${total} correctas</p>
            <p style="font-size:14px;margin-top:4px;color:${ap ? '#1a7a3a' : '#9b2335'};font-weight:600;">${ap ? '✅ Aprobado' : '❌ No aprobado (mínimo 60%)'}</p>
            <div style="margin-top:16px;padding:12px 16px;border-radius:10px;background:${ap ? 'rgba(39,174,96,0.1)' : 'rgba(192,57,43,0.1)'};border-left:4px solid ${ap ? '#27ae60' : '#e74c3c'};">
                <p style="font-size:14px;font-weight:600;color:${ap ? '#1a7a3a' : '#9b2335'};margin:0;">
                    ${ap
                        ? (porcentaje >= 90
                            ? '🌟 ¡Excelente trabajo! Dominaste el tema a la perfección.'
                            : porcentaje >= 75
                                ? '👏 ¡Muy bien! Tu esfuerzo está dando frutos. Sigue así.'
                                : '✅ ¡Felicitaciones! Aprobaste el examen. Sigue adelante.')
                        : (porcentaje >= 50
                            ? '💪 ¡No te rindas! Estás cerca. Revisa las lecciones y vuelve a intentarlo.'
                            : porcentaje >= 30
                                ? '📚 Sigue practicando. Repasa el material del curso y lo lograrás.'
                                : '🎯 Cada intento es una oportunidad de aprender. ¡Tú puedes!')}
                </p>
            </div>
            ${!ap ? `
                <p style="font-size:13px;margin-top:12px;color:var(--text-mid)">
                    ${canRetry
                        ? `Te quedan <strong>${totalAllowed - newAttempts}</strong> intento${totalAllowed - newAttempts > 1 ? 's' : ''} disponible${totalAllowed - newAttempts > 1 ? 's' : ''}.`
                        : 'Has agotado tus intentos. Contacta al administrador para solicitar uno adicional.'}
                </p>
            ` : ''}
        </div>

        ${!ap && canRetry ? `
        <div class="card" style="background:linear-gradient(135deg,#fef3e6 0%,#fff 100%);border-color:#e67e22;margin-bottom:20px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="font-size:32px;">💡</div>
                <div>
                    <h4 style="margin:0;font-size:15px;color:#b45309;">Consejo para aprobar</h4>
                    <p style="margin:4px 0 0;font-size:13px;color:var(--text-mid)">Revisa las lecciones del curso antes de reintentar. Necesitas al menos 60% para aprobar.</p>
                </div>
            </div>
        </div>` : ''}

        <div class="card">
            <h3 style="margin-bottom:14px;">Detalle de Respuestas</h3>
            ${respuestas.map((r, i) => `
                <div class="quiz-question" style="border-left:4px solid ${r.userAnswer === r.correctAnswer ? '#27ae60' : '#e74c3c'};">
                    <p>${i + 1}. ${escHtml(r.question)}</p>
                    <p style="font-size:13px;">
                        Tu respuesta: <strong>${r.userAnswer === null ? 'Sin responder' : r.userAnswer ? 'Verdadero' : 'Falso'}</strong>
                        &nbsp;·&nbsp;
                        Correcta: <strong style="color:#27ae60">${r.correctAnswer ? 'Verdadero' : 'Falso'}</strong>
                        &nbsp;${r.userAnswer === r.correctAnswer ? '✅' : '❌'}
                    </p>
                </div>`).join('')}
        </div>
        <div class="flex gap-2 justify-center mt-2" style="margin-bottom:32px;">
            <button class="btn btn-secondary" onclick="navigate('student/courses/${courseId}')">← Volver al Curso</button>
            ${!ap && canRetry
                ? `<button class="btn btn-warning" onclick="navigate('student/courses/${courseId}/quiz/${quizId}')">🔄 Reintentar Examen</button>`
                : !ap
                    ? `<button class="btn btn-outline" disabled style="opacity:0.6">🚫 Sin intentos disponibles</button>`
                    : `<button class="btn btn-primary" onclick="navigate('student/results')">📊 Ver Mis Resultados</button>`
            }
        </div>`;

    // Scroll suave al resultado
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function renderStudentQuizResult(container, courseId, quizId) {
    const params   = new URLSearchParams(window.location.hash.split('?')[1] || '');
    const resultId = params.get('id');
    let rData = null;
    let resultDocId = null;

    if (resultId) {
        const d = await db.collection('quizResults').doc(resultId).get();
        if (d.exists) { rData = d.data(); resultDocId = d.id; }
    }
    if (!rData) {
        try {
            const snap = await db.collection('quizResults')
                .where('userId', '==', currentUser.uid)
                .where('quizId', '==', quizId).get();
            if (!snap.empty) {
                const sorted = snap.docs.sort((a, b) => {
                    const aTime = a.data().createdAt?.toMillis?.() || 0;
                    const bTime = b.data().createdAt?.toMillis?.() || 0;
                    return bTime - aTime;
                });
                rData = sorted[0].data();

    let extraAttempts = 0;

    try {
        const allAttempts = await db.collection('quizResults')
            .where('userId', '==', currentUser.uid)
            .where('quizId', '==', quizId).get();
        attempts = allAttempts.size;

        const extraSnap = await db.collection('quizExtraAttempts')

            <p style="font-size:14px;margin-top:4px;color:${ap ? '#1a7a3a' : '#9b2335'};font-weight:600;">${ap ? '✅ Aprobado' : '❌ No aprobado (mínimo 60%)'}</p>

            <!-- Mensaje personalizado según resultado -->
            <div style="margin-top:16px;padding:12px 16px;border-radius:10px;background:${ap ? 'rgba(39,174,96,0.1)' : 'rgba(192,57,43,0.1)'};border-left:4px solid ${ap ? '#27ae60' : '#e74c3c'};">
                <p style="font-size:14px;font-weight:600;color:${ap ? '#1a7a3a' : '#9b2335'};margin:0;">
                    ${ap 
                        ? (rData.percentage >= 90 
                            ? '🌟 ¡Excelente trabajo! Dominaste el tema a la perfección.' 
                            : rData.percentage >= 75 
                                ? '👏 ¡Muy bien! Tu esfuerzo está dando frutos. Sigue así.' 
                                : '✅ ¡Felicitaciones! Aprobaste el examen. Sigue adelante.')
                        : (rData.percentage >= 50 
                            ? '💪 ¡No te rindas! Estás cerca. Revisa las lecciones y vuelve a intentarlo.' 
                            : rData.percentage >= 30 
                                ? '📚 Sigue practicando. Repasa el material del curso y lo lograrás.' 
                                : '🎯 Cada intento es una oportunidad de aprender. ¡Tú puedes!')
                    }
                </p>
            </div>

            ${!ap ? `
                <p style="font-size:13px;margin-top:12px;color:var(--text-mid)">
                    ${canRetry 
                        ? `Te quedan <strong>${(2 + extraAttempts) - attempts}</strong> intento${(2 + extraAttempts) - attempts > 1 ? 's' : ''} disponible${(2 + extraAttempts) - attempts > 1 ? 's' : ''}.` 
                        : 'Has agotado tus <strong>2 intentos</strong>. Contacta al administrador para solicitar uno adicional.'}
                </p>
            ` : ''}
        </div>

        ${!ap && canRetry ? `
        <div class="card" style="background:linear-gradient(135deg, #fef3e6 0%, #fff 100%);border-color:#e67e22;margin-bottom:20px;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="font-size:32px;">💡</div>
                <div>
                    <h4 style="margin:0;font-size:15px;color:#b45309;">Consejo para aprobar</h4>
                    <p style="margin:4px 0 0;font-size:13px;color:var(--text-mid)">Revisa las lecciones del curso antes de reintentar. Necesitas al menos 60% para aprobar.</p>
                </div>
            </div>
        </div>` : ''}

        <div class="card">
            <h3 style="margin-bottom:14px;">Detalle de Respuestas</h3>
            ${(rData.respuestas || []).map((r, i) => `
                <div class="quiz-question" style="border-left:4px solid ${r.userAnswer === r.correctAnswer ? '#27ae60' : '#e74c3c'};">
                    <p>${i + 1}. ${escHtml(r.question)}</p>
                    <p style="font-size:13px;">
                        Tu respuesta: <strong>${r.userAnswer === null ? 'Sin responder' : r.userAnswer ? 'Verdadero' : 'Falso'}</strong>
                        &nbsp;·&nbsp;
                        Correcta: <strong style="color:#27ae60">${r.correctAnswer ? 'Verdadero' : 'Falso'}</strong>
                        &nbsp;
                        ${r.userAnswer === r.correctAnswer ? '✅' : '❌'}
                    </p>
                </div>`).join('')}
        </div>
        <div class="flex gap-2 justify-center mt-2">
            <button class="btn btn-secondary" onclick="navigate('student/courses/${courseId}')">← Volver al Curso</button>
            ${!ap && canRetry 
                ? `<button class="btn btn-warning" onclick="navigate('student/courses/${courseId}/quiz/${quizId}')">🔄 Reintentar Examen</button>` 
                : !ap 
                    ? `<button class="btn btn-outline" disabled style="opacity:0.6">🚫 Sin intentos disponibles</button>`
                    : `<button class="btn btn-primary" onclick="navigate('student/results')">📊 Ver Mis Resultados</button>`
            }
        </div>`;
}

/* Navegar y hacer scroll al inicio del contenido */
function navigateAndScroll(route) {
    window.location.hash = route;
    // El scroll se ejecuta después de que handleRoute renderice el contenido
    setTimeout(() => scrollToContentTop(), 100);
}

/* Scroll al inicio del área de contenido principal */
function scrollToContentTop() {
    // Scroll suave al top de la página
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // También scroll al top del contenedor principal por si hay overflow interno
    const mainContent = document.getElementById('mainContent');
    if (mainContent) mainContent.scrollTop = 0;
    // En móvil, asegurar que el topbar sea visible
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
/* ════════════════════════════════════════
   SANITIZACIÓN DE HTML — SEGURIDAD XSS
   safeSetInnerHTML usa DOMParser para parsear el HTML recibido de
   Firestore y eliminar etiquetas/atributos peligrosos antes de
   inyectarlo en el DOM. Actúa como complemento a las restricciones
   de TinyMCE y a las reglas de Firestore.
════════════════════════════════════════ */
function safeSetInnerHTML(element, htmlString) {
    if (!element) return;
    /* Lista de etiquetas permitidas en contenido de lecciones */
    const ALLOWED_TAGS = new Set([
        'p','br','strong','b','em','i','u','s','strike','a','ul','ol','li',
        'h1','h2','h3','h4','h5','h6','table','thead','tbody','tfoot','tr','td','th',
        'img','blockquote','pre','code','hr','div','span','figure','figcaption',
        'colgroup','col','sup','sub'
    ]);
    /* Atributos peligrosos bloqueados por nombre */
    const DANGEROUS_ATTR_NAME = /^on/i;
    /* Protocolos peligrosos en valores de atributos href/src/action */
    const DANGEROUS_PROTO = /^\s*(javascript|vbscript|data)\s*:/i;
    /* Atributos que pueden tener URLs */
    const URL_ATTRS = new Set(['href','src','action','formaction','xlink:href']);

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString || '', 'text/html');

    function sanitizeNode(node) {
        if (node.nodeType === Node.TEXT_NODE) return true;
        if (node.nodeType !== Node.ELEMENT_NODE) return false;
        const tag = node.tagName.toLowerCase();
        if (!ALLOWED_TAGS.has(tag)) return false;
        /* Eliminar atributos peligrosos */
        Array.from(node.attributes).forEach(attr => {
            const name = attr.name.toLowerCase();
            const val  = attr.value;
            /* Bloquear handlers de eventos (onclick, onerror, etc.) */
            if (DANGEROUS_ATTR_NAME.test(name)) { node.removeAttribute(attr.name); return; }
            /* Bloquear protocolos peligrosos en URLs */
            if (URL_ATTRS.has(name) && DANGEROUS_PROTO.test(val)) { node.removeAttribute(attr.name); return; }
            /* Bloquear data: en cualquier atributo */
            if (/^data\s*:/i.test(val) && name !== 'data-*') { node.removeAttribute(attr.name); return; }
        });
        /* Imágenes: quitar width/height fijos para que sean fluidas en móvil */
        if (tag === 'img') {
            node.removeAttribute('width');
            node.removeAttribute('height');
            node.setAttribute('loading', 'lazy');
            /* Limpiar width/height del style inline también */
            let style = node.getAttribute('style') || '';
            style = style
                .replace(/\bwidth\s*:\s*[^;]+;?/gi, '')
                .replace(/\bheight\s*:\s*[^;]+;?/gi, '')
                .replace(/\bmax-width\s*:\s*[^;]+;?/gi, '');
            node.setAttribute('style', (style + ';max-width:100%;height:auto;').trim());
        }
        /* Tablas: quitar width fijo */
        if (tag === 'table') {
            node.removeAttribute('width');
            let style = node.getAttribute('style') || '';
            style = style.replace(/\bwidth\s*:\s*[^;]+;?/gi, '');
            node.setAttribute('style', (style + ';width:100%;').trim());
        }
        /* TD/TH: quitar width fijo, permitir word-break */
        if (tag === 'td' || tag === 'th') {
            node.removeAttribute('width');
        }
        /* DIV/SPAN: quitar font-size muy pequeño que rompe legibilidad móvil */
        if (['div','span','p','li','td','th'].includes(tag)) {
            let style = node.getAttribute('style') || '';
            /* Reemplazar font-size menores a 13px por 14px */
            style = style.replace(/font-size\s*:\s*(\d+(?:\.\d+)?)(px|pt)/gi, (match, val, unit) => {
                const px = unit === 'pt' ? parseFloat(val) * 1.333 : parseFloat(val);
                return px < 13 ? 'font-size:14px' : match;
            });
            if (style) node.setAttribute('style', style);
        }
        /* Para enlaces: validar href y forzar noopener */
        if (tag === 'a') {
            const href = node.getAttribute('href') || '';
            /* Solo permitir https://, http:// y anclas # */
            if (href && !/^(https?:\/\/|#)/i.test(href)) {
                node.removeAttribute('href');
            }
            node.setAttribute('target', '_blank');
            node.setAttribute('rel', 'noopener noreferrer');
        }
        return true;
    }

    function cloneClean(srcNode, destParent) {
        if (srcNode.nodeType === Node.TEXT_NODE) {
            destParent.appendChild(document.createTextNode(srcNode.textContent));
            return;
        }
        if (srcNode.nodeType === Node.ELEMENT_NODE) {
            /* IMPORTANTE: sanitizar el nodo fuente ANTES de clonarlo */
            if (!sanitizeNode(srcNode)) return;
            const clone = document.createElement(srcNode.tagName);
            /* Copiar solo los atributos que quedaron tras la sanitización */
            Array.from(srcNode.attributes).forEach(a => clone.setAttribute(a.name, a.value));
            destParent.appendChild(clone);
            srcNode.childNodes.forEach(child => cloneClean(child, clone));
        }
    }

    element.innerHTML = '';
    doc.body.childNodes.forEach(child => cloneClean(child, element));
}

function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

// Toast de notificación simple
function toast(msg, type = 'error') {
    const el = document.createElement('div');
    el.textContent = msg;
    Object.assign(el.style, {
        position: 'fixed', bottom: '24px', right: '24px', zIndex: '9999',
        padding: '12px 20px', borderRadius: '10px', fontFamily: 'Sora,sans-serif',
        fontSize: '13.5px', fontWeight: '600', maxWidth: '320px',
        boxShadow: '0 8px 24px rgba(0,0,0,0.18)',
        background: type === 'success' ? '#27ae60' : '#c0392b',
        color: '#fff',
        animation: 'slideUp 0.25s ease'
    });
    const style = document.createElement('style');
    style.textContent = '@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(style);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

/* ════════════════════════════════════════
   INICIALIZACIÓN DE TinyMCE (Editor profesional)
════════════════════════════════════════ */
function initTinyMCE(selector, height, initialContent) {
    height = height || 350;
    if (typeof tinymce === 'undefined') {
        console.error('TinyMCE no cargado');
        return;
    }

    const editorId = selector.replace('#', '');
    const existing = tinymce.get(editorId);
    if (existing) {
        existing.remove();
    }

    // Guardar contenido inicial en una variable global temporal
    window._tinymceInitialContent = window._tinymceInitialContent || {};
    window._tinymceInitialContent[editorId] = initialContent || '';

    tinymce.init({
        selector: selector,
        language: 'es',
        height: height,
        plugins: [
            'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
            'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
            'insertdatetime', 'media', 'table', 'help', 'wordcount',
            'paste', 'emoticons'
        ],
        toolbar: [
            'undo redo | formatselect | bold italic underline strikethrough |',
            'alignleft aligncenter alignright alignjustify |',
            'bullist numlist outdent indent | removeformat |',
            'link image table media charmap emoticons |',
            'forecolor backcolor | code fullscreen preview | help'
        ],
        paste_data_images: true,
        paste_as_text: false,
        paste_merge_formats: true,
        paste_retain_style_properties: 'all',
        paste_word_valid_elements: 'b,strong,i,em,u,span,p,br,table,tbody,tr,td,th,thead,tfoot,colgroup,col,ul,ol,li,h1,h2,h3,h4,h5,h6,img,a',
        paste_strip_class_attributes: 'none',
        valid_elements: 'p[style],br,strong/b,em/i,u,s,strike,a[href|target=_blank|rel],ul,ol,li,h1,h2,h3,h4,h5,h6,table[border|cellpadding|cellspacing|style],thead,tbody,tfoot,tr,td[colspan|rowspan|style],th[colspan|rowspan|style],img[src|alt|width|height|style],blockquote,pre,code,hr,div[style],span[style]',
        extended_valid_elements: 'img[src|alt|width|height|style|loading=lazy]',
        valid_children: '+div[style],+p[style]',
        image_title: true,
        image_advtab: true,
        image_description: true,
        resize: true,
        statusbar: true,
        contextmenu: 'link image table',
        branding: false,
        promotion: false,
        init_instance_callback: function(editor) {
            // Callback ejecutado cuando el editor está 100% inicializado
            const savedContent = window._tinymceInitialContent && window._tinymceInitialContent[editor.id];
            if (savedContent) {
                editor.setContent(savedContent);
                // Limpiar después de usar
                delete window._tinymceInitialContent[editor.id];
            }
        },
        setup: function(editor) {
            editor.ui.registry.addButton('uploadimage', {
                icon: 'upload',
                tooltip: 'Subir imagen desde archivo',
                onAction: function() {
                    insertImageToTinyMCE(editor.id);
                }
            });
        },
        images_upload_url: '',
        images_upload_handler: function(blobInfo, progress) {
            return new Promise(async (resolve, reject) => {
                try {
                    const url = await uploadImageToImgBB(blobInfo.blob());
                    resolve(url);
                } catch(err) {
                    reject('Error subiendo imagen: ' + err.message);
                }
            });
        }
    });
}

async function insertImageToTinyMCE(editorId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async function() {
        const file = input.files[0];
        if (!file) return;
        const progress = document.getElementById('uploadProgress');
        if (progress) progress.classList.add('active');
        try {
            const url = await uploadImageToImgBB(file);
            const editor = tinymce.get(editorId);
            if (editor) {
                editor.insertContent('<img src="' + url + '" style="max-width:100%;border-radius:8px;" alt="Imagen" />');
            }
            toast('✅ Imagen insertada', 'success');
        } catch(err) {
            toast('❌ Error: ' + err.message, 'error');
        } finally {
            if (progress) progress.classList.remove('active');
        }
    };
    input.click();
}

function getTinyMCEContent(editorId) {
    const cleanId = editorId.replace('#', '');
    const editor = tinymce.get(cleanId);
    if (editor) return editor.getContent();
    const el = document.getElementById(cleanId);
    return el ? el.value : '';
}

function destroyTinyMCE(editorId) {
    const cleanId = editorId.replace('#', '');
    const editor = tinymce.get(cleanId);
    if (editor) editor.remove();
}

/* ════════════════════════════════════════
   SUBIDA DE IMÁGENES
   SEGURIDAD: Se eliminó el método anterior que usaba la interfaz web
   no-oficial de ImgBB (scraping). Ahora se convierte la imagen a base64
   y se almacena en Firestore/Storage, o se usa la API pública de ImgBB.
   RECOMENDACIÓN: usa Firebase Storage para mantener control total.
════════════════════════════════════════ */
async function uploadImageToImgBB(file) {
    return new Promise((resolve, reject) => {
        /* Límite de tamaño: 5 MB para imágenes */
        const MAX_SIZE = 5 * 1024 * 1024;
        if (file.size > MAX_SIZE) {
            reject(new Error('La imagen supera el límite de 5 MB.'));
            return;
        }
        /* Solo tipos MIME de imagen */
        const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (!ALLOWED_TYPES.includes(file.type)) {
            reject(new Error('Tipo de archivo no permitido. Solo JPG, PNG, GIF o WEBP.'));
            return;
        }

        const progress = document.getElementById('uploadProgress');
        if (progress) progress.classList.add('active');

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            const formData = new FormData();
            formData.append('image', base64);
            formData.append('type', 'base64');

            /* SEGURIDAD: La API key de ImgBB va aquí. Esta key SIEMPRE será visible
               para cualquiera que inspeccione el código fuente del navegador.
               RECOMENDACIÓN: Usa un Cloudflare Worker como proxy para no exponer la key.
               El Worker recibe la imagen, agrega la key en el servidor, y reenvía a ImgBB.
               Alternativamente, usa Firebase Storage para control total sin key externa. */
            fetch('https://api.imgbb.com/1/upload?key=TU_API_KEY_IMGBB', {
                method: 'POST',
                body: formData
            })
            .then(r => {
                if (progress) progress.classList.remove('active');
                if (!r.ok) throw new Error('Error HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                if (data.success && data.data && data.data.url) {
                    resolve(data.data.url);
                } else {
                    reject(new Error('Respuesta inválida del servidor de imágenes.'));
                }
            })
            .catch(err => {
                if (progress) progress.classList.remove('active');
                reject(new Error('Error al subir imagen: ' + err.message));
            });
        };
        reader.onerror = () => {
            if (progress) progress.classList.remove('active');
            reject(new Error('No se pudo leer el archivo.'));
        };
        reader.readAsDataURL(file);
    });
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const lf = document.getElementById('loginForm');
        const rf = document.getElementById('registerForm');
        if (lf && !lf.classList.contains('hidden')) login();
        if (rf && !rf.classList.contains('hidden')) register();
    }
});
